<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>CallingClaw Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: rgba(10, 10, 10, 0.88); --surface: rgba(30, 30, 30, 0.9);
      --border: rgba(255,255,255,0.08); --text: #e5e5e5; --text2: #888;
      --accent: #6366f1; --green: #22c55e; --red: #ef4444; --yellow: #eab308;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: transparent; color: var(--text); overflow: hidden;
    }
    .overlay {
      background: var(--bg); border-radius: 16px; border: 1px solid var(--border);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      height: 100vh; display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* Drag handle */
    .handle {
      height: 36px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; -webkit-app-region: drag;
      border-bottom: 1px solid var(--border);
    }
    .handle-title { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
    .handle-close {
      -webkit-app-region: no-drag; background: none; border: none;
      color: var(--text2); font-size: 14px; cursor: pointer; padding: 2px 6px;
      border-radius: 4px;
    }
    .handle-close:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* Status bar */
    .status-bar {
      display: flex; align-items: center; gap: 8px; padding: 10px 14px;
      border-bottom: 1px solid var(--border); font-size: 12px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; }
    .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot.yellow { background: var(--yellow); }
    .dot.red { background: var(--red); }
    .status-text { color: var(--text2); }
    .layer-badge {
      margin-left: auto; font-size: 10px; padding: 2px 8px;
      background: rgba(99,102,241,0.2); color: var(--accent);
      border-radius: 4px; font-weight: 600;
    }

    /* ── Section headers ── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; font-size: 10px; font-weight: 700;
      color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border); cursor: pointer;
      -webkit-user-select: none; user-select: none;
    }
    .section-header:hover { background: rgba(255,255,255,0.03); }
    .section-chevron { font-size: 10px; transition: transform 0.2s; }
    .section-chevron.collapsed { transform: rotate(-90deg); }

    /* ── Meeting Prep section ── */
    .meeting-prep {
      border-bottom: 1px solid var(--border); display: none;
    }
    .meeting-prep.show { display: block; }
    .prep-body {
      padding: 8px 14px 10px; overflow: hidden; transition: max-height 0.2s;
    }
    .prep-body.collapsed { max-height: 0 !important; padding: 0 14px; }
    .prep-topic {
      font-size: 13px; font-weight: 600; color: var(--text);
      margin-bottom: 4px; line-height: 1.3;
    }
    .prep-goal {
      font-size: 11px; color: var(--accent); margin-bottom: 6px;
    }
    .prep-points {
      list-style: none; padding: 0; margin: 0;
    }
    .prep-points li {
      font-size: 11px; color: var(--text2); line-height: 1.5;
      padding-left: 12px; position: relative;
    }
    .prep-points li::before {
      content: '·'; position: absolute; left: 2px; color: var(--accent); font-weight: 700;
    }

    /* ── AI Activity section ── */
    .ai-activity {
      border-bottom: 1px solid var(--border);
    }
    .activity-body {
      height: 120px; overflow-y: auto; padding: 6px 14px; font-size: 11px;
      transition: height 0.2s;
    }
    .activity-body.collapsed { height: 0; padding: 0 14px; overflow: hidden; }
    .activity-entry {
      margin-bottom: 4px; line-height: 1.4; display: flex; gap: 6px; align-items: baseline;
    }
    .activity-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
      flex-shrink: 0; text-transform: uppercase;
    }
    .activity-badge.delta { background: rgba(99,102,241,0.15); color: var(--accent); }
    .activity-badge.done { background: rgba(34,197,94,0.15); color: var(--green); }
    .activity-badge.error { background: rgba(239,68,68,0.15); color: var(--red); }
    .activity-badge.tool { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .activity-text { color: var(--text2); word-break: break-word; }
    .activity-time { font-size: 9px; color: rgba(255,255,255,0.2); margin-left: auto; flex-shrink: 0; }

    /* ── Transcript area ── */
    .transcript {
      flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 12px; line-height: 1.6;
    }
    .transcript-entry { margin-bottom: 10px; }
    .transcript-speaker { font-weight: 600; font-size: 11px; color: var(--accent); margin-bottom: 2px; }
    .transcript-text { color: var(--text); }
    .transcript-action {
      color: var(--green); font-size: 11px; font-style: italic;
      padding: 4px 8px; background: rgba(34,197,94,0.08);
      border-radius: 6px; margin-top: 4px;
    }
    .transcript-time { font-size: 10px; color: var(--text2); }

    /* Error banner */
    .error-banner {
      padding: 8px 14px; background: rgba(239,68,68,0.12);
      border-top: 1px solid rgba(239,68,68,0.2); font-size: 11px;
      color: var(--red); display: none;
    }
    .error-banner.show { display: flex; align-items: center; gap: 8px; }
    .error-banner button {
      margin-left: auto; background: var(--red); color: #fff; border: none;
      padding: 3px 10px; border-radius: 4px; font-size: 10px; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="handle">
      <span class="handle-title">CallingClaw</span>
      <button class="handle-close" onclick="window.callingclaw.overlay.hide()">✕</button>
    </div>

    <div class="status-bar">
      <span class="dot green" id="overlay-dot"></span>
      <span class="status-text" id="overlay-status">连接中...</span>
      <span class="layer-badge" id="overlay-layer">--</span>
    </div>

    <!-- Meeting Prep Brief -->
    <div class="meeting-prep" id="meeting-prep">
      <div class="section-header" onclick="toggleSection('prep')">
        <span>会议准备</span>
        <span class="section-chevron" id="prep-chevron">▾</span>
      </div>
      <div class="prep-body" id="prep-body">
        <div class="prep-topic" id="prep-topic"></div>
        <div class="prep-goal" id="prep-goal"></div>
        <ul class="prep-points" id="prep-points"></ul>
      </div>
    </div>

    <!-- AI Activity Feed -->
    <div class="ai-activity">
      <div class="section-header" onclick="toggleSection('activity')">
        <span>AI 活动</span>
        <span class="section-chevron" id="activity-chevron">▾</span>
      </div>
      <div class="activity-body" id="activity-body"></div>
    </div>

    <div class="transcript" id="transcript"></div>

    <div class="error-banner" id="error-banner">
      <span id="error-text"></span>
      <button onclick="retryAction()">重试</button>
    </div>
  </div>

  <script>
    const DAEMON_URL = 'http://localhost:4000';
    const transcript = document.getElementById('transcript');
    const activityBody = document.getElementById('activity-body');
    let ws = null;

    // ── Section toggle ──
    function toggleSection(id) {
      const body = document.getElementById(id === 'prep' ? 'prep-body' : 'activity-body');
      const chevron = document.getElementById(id + '-chevron');
      body.classList.toggle('collapsed');
      chevron.classList.toggle('collapsed');
    }

    // ── Meeting Prep ──
    function showMeetingPrep(brief) {
      const el = document.getElementById('meeting-prep');
      document.getElementById('prep-topic').textContent = brief.topic || '';
      document.getElementById('prep-goal').textContent = brief.goal ? `目标: ${brief.goal}` : '';
      const pointsEl = document.getElementById('prep-points');
      pointsEl.innerHTML = '';
      (brief.keyPoints || []).forEach(p => {
        const li = document.createElement('li');
        li.textContent = p;
        pointsEl.appendChild(li);
      });
      el.classList.add('show');
    }

    function hideMeetingPrep() {
      document.getElementById('meeting-prep').classList.remove('show');
    }

    async function fetchPrepBrief() {
      try {
        const res = await fetch(`${DAEMON_URL}/api/meeting/prep-brief`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.prepBrief?.topic) showMeetingPrep(data.prepBrief);
      } catch {}
    }

    // ── AI Activity ──
    function addActivity(kind, text) {
      const div = document.createElement('div');
      div.className = 'activity-entry';
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      div.innerHTML = `
        <span class="activity-badge ${kind}">${kind}</span>
        <span class="activity-text">${escapeHtml(text)}</span>
        <span class="activity-time">${time}</span>
      `;
      activityBody.appendChild(div);
      activityBody.scrollTop = activityBody.scrollHeight;
      while (activityBody.children.length > 50) {
        activityBody.removeChild(activityBody.firstChild);
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s || '';
      return d.innerHTML;
    }

    function connect() {
      try {
        ws = new WebSocket(`ws://localhost:4000/ws/events`);
      } catch {
        setTimeout(connect, 3000);
        return;
      }

      ws.onopen = () => {
        document.getElementById('overlay-dot').className = 'dot green';
        document.getElementById('overlay-status').textContent = '已连接';
      };

      ws.onmessage = (e) => {
        try {
          const event = JSON.parse(e.data);
          handleEvent(event);
        } catch {}
      };

      ws.onclose = () => {
        document.getElementById('overlay-dot').className = 'dot red';
        document.getElementById('overlay-status').textContent = '已断开';
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();
    }

    function handleEvent(event) {
      const { type, data } = event;

      switch (type) {
        case 'meeting.started':
          document.getElementById('overlay-status').textContent = '会议中';
          addEntry('系统', `已加入会议`, 'action');
          fetchPrepBrief();
          break;

        case 'meeting.ended':
          document.getElementById('overlay-status').textContent = '会议结束';
          addEntry('系统', `会议已结束`, 'action');
          hideMeetingPrep();
          break;

        case 'meeting.agenda':
          if (data?.topic) showMeetingPrep(data);
          break;

        case 'voice.tool_call':
          document.getElementById('overlay-layer').textContent = data?.tool || '--';
          addActivity('tool', data?.tool || 'tool call');
          break;

        case 'computer.task_done':
          document.getElementById('overlay-layer').textContent = data?.layer || '--';
          addEntry('自动化', `${data?.summary || data?.instruction}`, 'action');
          addActivity('done', data?.summary || data?.instruction || 'task completed');
          break;

        case 'openclaw.delta':
          addActivity('delta', data?.summary || data?.text || '...');
          break;

        case 'openclaw.done':
          addActivity('done', data?.summary || '任务完成');
          break;

        case 'openclaw.error':
          addActivity('error', data?.summary || data?.message || '错误');
          break;

        case 'meeting.action_item':
          addEntry('行动项', data?.text, 'action');
          break;

        case 'transcript.entry':
          addEntry(data?.speaker || '参与者', data?.text);
          break;

        default:
          if (data?.layer) {
            document.getElementById('overlay-layer').textContent = data.layer;
          }
      }
    }

    function addEntry(speaker, text, type = 'text') {
      const div = document.createElement('div');
      div.className = 'transcript-entry';

      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      div.innerHTML = `
        <div class="transcript-speaker">${speaker} <span class="transcript-time">${time}</span></div>
        <div class="${type === 'action' ? 'transcript-action' : 'transcript-text'}">${text}</div>
      `;

      transcript.appendChild(div);
      transcript.scrollTop = transcript.scrollHeight;

      // Limit entries
      while (transcript.children.length > 100) {
        transcript.removeChild(transcript.firstChild);
      }
    }

    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-banner').classList.add('show');
    }

    function retryAction() {
      document.getElementById('error-banner').classList.remove('show');
      fetch(`${DAEMON_URL}/api/meeting/retry`, { method: 'POST' }).catch(() => {});
    }

    // Start
    connect();
  </script>
</body>
</html>
