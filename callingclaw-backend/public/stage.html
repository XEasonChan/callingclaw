<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallingClaw Presenting</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Design Tokens (CallingClaw Official) ──────── */
    :root {
      --bg: #FFFFFF;
      --bg-subtle: #F8F8FA;
      --surface: #ffffff;
      --text: #1f2937;
      --text2: #6b7280;
      --text3: #9ca3af;
      --accent: #dc4a3a;
      --accent-hover: #c43d2e;
      --accent-light: #fef2f1;
      --accent-glow: rgba(220, 74, 58, 0.12);
      --green: #4aa682;
      --green-light: #e6f4ee;
      --yellow: #d97706;
      --yellow-light: #fef3c7;
      --blue: #6366f1;
      --blue-light: #eef2ff;
      --cyan: #0891b2;
      --cyan-light: #ecfeff;
      --border: #e5e7eb;
      --border-sketch: #c9cdd4;

      --font-display: "Space Grotesk", system-ui, sans-serif;
      --font-body: "Inter", system-ui, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.03);
      --shadow-md: 0 4px 12px rgba(0,0,0,0.04);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.06);

      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Hand-drawn border mixin ──────────────────── */
    .sketch-box {
      border: 2px solid var(--border-sketch);
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      background: var(--surface);
    }

    .sketch-box-sm {
      border: 1.5px solid var(--border-sketch);
      border-radius: 15px 255px 15px 225px / 225px 15px 255px 15px;
      background: var(--surface);
    }

    .sketch-box-alt {
      border: 2px solid var(--border-sketch);
      border-radius: 225px 15px 255px 15px / 15px 255px 15px 225px;
      background: var(--surface);
    }

    /* ── Main Layout ─────────────────────────────── */
    .stage {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      gap: 12px;
    }

    /* ── Header ──────────────────────────────────── */
    .stage-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 4px;
      flex-shrink: 0;
    }

    .stage-logo {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
    }

    .stage-logo img {
      width: 24px;
      height: 24px;
    }

    .stage-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .stage-divider {
      width: 1px;
      height: 18px;
      background: var(--border);
      margin: 0 4px;
    }

    .stage-meeting {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: -0.01em;
    }

    .stage-clock {
      margin-left: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--text3);
      font-variant-numeric: tabular-nums;
    }

    .stage-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 20px;
      margin-left: 8px;
    }

    .stage-status.connected {
      background: var(--green-light);
      color: var(--green);
    }

    .stage-status.disconnected {
      background: var(--accent-light);
      color: var(--accent);
    }

    .stage-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── Content Area ────────────────────────────── */
    .content {
      flex: 1;
      display: flex;
      gap: 16px;
      min-height: 0;
    }

    /* ── Left: Slide Player — greedy on narrow, capped at 4:3 on wide ── */
    .slide-player {
      width: min(calc(100% - 296px), calc((100vh - 60px) * 4 / 3));
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slide-frame-outer {
      flex: 1;
      position: relative;
      border-radius: 20px;
      min-height: 0;
    }

    .slide-frame {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      overflow: hidden;
      background: var(--bg-subtle);
      border: 1.5px solid var(--border);
    }

    /* Inward rotating glow — uniform on all 4 edges */
    .slide-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 15px;
      pointer-events: none;
      z-index: 3;
      background: conic-gradient(
        from var(--glow-angle, 0deg),
        rgba(220, 74, 58, 0.50),
        rgba(245, 160, 50, 0.35),
        rgba(255, 255, 255, 0.25),
        rgba(245, 160, 50, 0.35),
        rgba(220, 74, 58, 0.50)
      );
      -webkit-mask:
        linear-gradient(to right,  black, transparent 36px) left   / 36px 100% no-repeat,
        linear-gradient(to left,   black, transparent 36px) right  / 36px 100% no-repeat,
        linear-gradient(to bottom, black, transparent 36px) top    / 100% 36px no-repeat,
        linear-gradient(to top,    black, transparent 36px) bottom / 100% 36px no-repeat;
      mask:
        linear-gradient(to right,  black, transparent 36px) left   / 36px 100% no-repeat,
        linear-gradient(to left,   black, transparent 36px) right  / 36px 100% no-repeat,
        linear-gradient(to bottom, black, transparent 36px) top    / 100% 36px no-repeat,
        linear-gradient(to top,    black, transparent 36px) bottom / 100% 36px no-repeat;
      -webkit-mask-composite: source-over;
      mask-composite: add;
      animation: glowSpin 8s linear infinite, breathe 5s ease-in-out infinite;
    }

    @property --glow-angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false;
    }

    @keyframes glowSpin {
      to { --glow-angle: 360deg; }
    }

    @keyframes breathe {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.95; }
    }

    /* Active state — faster spin, brighter */
    .slide-frame-outer.active .slide-frame::after {
      animation: glowSpin 6s linear infinite, breatheActive 4s ease-in-out infinite;
    }

    @keyframes breatheActive {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Thinking state — fastest spin, brightest */
    .slide-frame-outer.thinking .slide-frame::after {
      background: conic-gradient(
        from var(--glow-angle, 0deg),
        rgba(220, 74, 58, 0.65),
        rgba(245, 160, 50, 0.45),
        rgba(255, 255, 255, 0.35),
        rgba(245, 160, 50, 0.45),
        rgba(220, 74, 58, 0.65)
      );
      animation: glowSpin 3s linear infinite, breatheThink 2.5s ease-in-out infinite;
    }

    @keyframes breatheThink {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    .slide-frame iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .slide-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 2;
    }

    .slide-placeholder .logo-big {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .slide-placeholder .logo-big img {
      width: 56px;
      height: 56px;
    }

    .slide-placeholder .tagline {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: -0.02em;
    }

    .slide-placeholder .subtitle {
      font-size: 13px;
      color: var(--text3);
      text-align: center;
      line-height: 1.5;
    }

    .slide-nav {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
    }

    .slide-info {
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text2);
      flex: 1;
      text-align: center;
    }

    .slide-nav button {
      width: 28px;
      height: 28px;
      border: 1.5px solid var(--border-sketch);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .slide-nav button:hover {
      background: var(--bg-subtle);
      color: var(--text);
    }

    /* ── Right: Workspace — 280px min, absorbs extra on wide screens ── */
    .workspace {
      flex: 1;
      min-width: 280px;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    /* ── Model Log Panel — compact, ~1:1 aspect ── */
    .model-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 10px 12px 6px;
      position: relative;
    }

    .model-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 12px;
      right: 12px;
      height: 3px;
      border-radius: 0 0 3px 3px;
      background: var(--panel-accent, var(--border));
      opacity: 0;
      transition: opacity 0.3s;
    }

    .model-panel.active::before {
      opacity: 1;
    }

    .model-panel.s1 { --panel-accent: var(--accent); }
    .model-panel.s2 { --panel-accent: var(--blue); }

    .model-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-shrink: 0;
    }

    .model-icon {
      width: 28px;
      height: 28px;
      border-radius: 255px 15px 225px 15px / 15px 225px 15px 255px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .s1 .model-icon {
      background: var(--accent-light);
      color: var(--accent);
      border: 1.5px solid rgba(220, 74, 58, 0.2);
    }

    .s2 .model-icon {
      background: var(--blue-light);
      color: var(--blue);
      border: 1.5px solid rgba(99, 102, 241, 0.2);
    }

    .model-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .model-provider {
      font-size: 11px;
      color: var(--text3);
    }

    .model-status-label {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text2);
    }

    .model-status-label .indicator {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }

    .model-status-label .indicator.active {
      background: var(--green);
      box-shadow: 0 0 6px rgba(74, 166, 130, 0.4);
    }

    .model-status-label .indicator.thinking {
      background: var(--yellow);
      box-shadow: 0 0 6px rgba(217, 119, 6, 0.4);
      animation: pulse 1s ease-in-out infinite;
    }

    /* Log scroll area */
    .model-log {
      flex: 1;
      overflow-y: auto;
      font-family: var(--font-mono);
      font-size: 11.5px;
      line-height: 1.7;
      min-height: 0;
    }

    .model-log::-webkit-scrollbar { width: 3px; }
    .model-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .log-entry {
      display: flex;
      gap: 8px;
      padding: 2px 0;
      animation: logFade 0.3s var(--ease);
      align-items: baseline;
    }

    @keyframes logFade {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: none; }
    }

    .log-time {
      color: var(--text3);
      flex-shrink: 0;
      font-size: 10px;
      min-width: 48px;
    }

    .log-type {
      color: var(--text2);
      flex-shrink: 0;
      min-width: 140px;
    }

    .log-detail {
      color: var(--text3);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .log-detail .hl {
      color: var(--text);
      font-weight: 500;
    }

    .log-empty {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-family: var(--font-body);
      font-size: 13px;
      color: var(--text3);
    }

    /* ── Documents Section ────────────────────────── */
    .documents {
      padding: 12px 14px;
      flex-shrink: 0;
      min-height: 120px;
      max-height: 180px;
      overflow-y: auto;
    }

    .docs-label {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .doc-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .doc-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text);
      background: var(--bg-subtle);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: all 0.15s;
    }

    .doc-row:hover {
      background: var(--surface);
      box-shadow: var(--shadow-sm);
    }

    .doc-row .doc-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .doc-row .doc-icon svg {
      width: 18px;
      height: 18px;
    }

    .doc-row .doc-name {
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-family: var(--font-body);
    }

    .doc-row .badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .doc-row .badge.new {
      background: var(--accent-light); color: var(--accent);
      position: relative;
    }
    .doc-row .badge.new::after {
      content: "";
      position: absolute;
      top: -2px; right: -2px;
      width: 7px; height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: doc-pulse 1.5s ease-in-out 4;
    }
    @keyframes doc-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.5); }
    }
    .doc-row .badge.modified { background: var(--yellow-light); color: var(--yellow); }

    /* ── Responsive — stack vertically on narrow screens ── */
    @media (max-width: 900px) {
      .content { flex-direction: column; }
      .slide-player { width: 100%; flex-shrink: 0; height: 50vh; }
      .slide-frame-outer { flex: 1; }
      .workspace { max-width: none; min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="stage">
    <!-- Header -->
    <div class="stage-header">
      <div class="stage-logo">
        <img src="./logo.png" alt="CC" onerror="this.parentElement.innerHTML='<span style=&quot;color:var(--accent);font-family:Space Grotesk;font-weight:700;font-size:14px&quot;>CC</span>'">
      </div>
      <span class="stage-title">CallingClaw</span>
      <div class="stage-divider"></div>
      <span class="stage-meeting" id="meetingName">Connecting...</span>
      <span class="stage-clock" id="clock"></span>
      <span class="stage-status connected" id="wsStatus">
        <span class="dot"></span>
        <span id="wsStatusText">Live</span>
      </span>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Left: Slide Player with breathing gradient -->
      <div class="slide-player">
        <div class="slide-frame-outer active" id="slideOuter">
          <div class="slide-frame">
            <iframe id="slideFrame" src="about:blank"></iframe>
            <div class="slide-placeholder" id="slidePlaceholder">
              <div class="logo-big">
                <img src="./logo.png" alt="CC" onerror="this.parentElement.innerHTML='<span style=&quot;color:var(--accent);font-family:Space Grotesk;font-weight:700;font-size:28px&quot;>CC</span>'">
              </div>
              <div class="tagline">Your AI is preparing...</div>
              <div class="subtitle">Presentation will appear here when slides are loaded</div>
            </div>
          </div>
        </div>
        <div class="slide-nav" id="slideNav" style="display:none;">
          <button onclick="slideAction('prev')">&larr;</button>
          <span class="slide-info" id="slideInfo">Slide 1 / 1</span>
          <button onclick="slideAction('next')">&rarr;</button>
        </div>
      </div>

      <!-- Right: Workspace -->
      <div class="workspace">
        <!-- System 1: Voice -->
        <div class="model-panel sketch-box s1" id="panel-s1">
          <div class="model-head">
            <div class="model-icon">S1</div>
            <div>
              <div class="model-name">System One</div>
              <div class="model-provider" id="s1-provider">Voice + Presentation</div>
            </div>
            <div class="model-status-label">
              <span class="indicator active" id="s1-ind"></span>
              <span id="s1-status">Listening</span>
            </div>
          </div>
          <div class="model-log" id="s1-log">
            <div class="log-empty">Voice transcript will appear here...</div>
          </div>
        </div>

        <!-- System 2: Agent -->
        <div class="model-panel sketch-box-alt s2" id="panel-s2">
          <div class="model-head">
            <div class="model-icon">S2</div>
            <div>
              <div class="model-name">System Two</div>
              <div class="model-provider">Agent + Action</div>
            </div>
            <div class="model-status-label">
              <span class="indicator" id="s2-ind"></span>
              <span id="s2-status">Standby</span>
            </div>
          </div>
          <div class="model-log" id="s2-log">
            <div class="log-empty">Agent actions will appear here...</div>
          </div>
        </div>

        <!-- Working Documents -->
        <div class="documents sketch-box-sm" id="documents">
          <div class="docs-label">Working Documents</div>
          <div class="doc-list" id="docList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Config ───────────────────────────────────────
    var API = 'http://localhost:4000';
    var WS_URL = 'ws://localhost:4000/ws/events';
    var MAX_LOG = 80;
    var DEMO_MODE = true; // set false when real backend is connected
    var ws = null;
    var documents = new Map();

    // ── Clock ────────────────────────────────────────
    function updateClock() {
      var now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    }
    setInterval(updateClock, 1000);
    updateClock();

    // ── Helpers ──────────────────────────────────────
    function esc(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
    function trunc(s, n) { return s && s.length > n ? s.slice(0, n) + '...' : (s || ''); }
    function timeStr(ts) {
      var d = new Date(ts || Date.now());
      return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
    }

    // ── Categorize into S1 or S2 ─────────────────────
    // S1 = Voice Panel: transcript + tool calls only (no vision noise)
    function isSystem1(type) {
      return type === 'meeting.live_entry' || type === 'voice.tool_call' ||
             type === 'voice.started' || type === 'voice.stopped' ||
             type === 'presentation.slide';
    }

    // S2 = Agent Panel: intent classification + search + actions (no openclaw.done noise)
    function isSystem2(type) {
      return type === 'auditor.intent' || type === 'auditor.executing' ||
             type === 'auditor.fast_lane' || type === 'auditor.suggest' ||
             type.startsWith('retriever.') || type.startsWith('research.') ||
             type === 'computer.task_started' || type === 'computer.task_done' ||
             type === 'meeting.prep_ready';
    }

    // ── Format event detail for log ──────────────────
    function fmtDetail(type, data) {
      if (!data) return '';
      // S1 Voice Panel — transcript + tool calls with icons
      if (type === 'meeting.live_entry') {
        var entry = data.entry || data.text || '';
        // Parse role from entry format: [AI] text, [USER] text, [SYSTEM] text
        var icon = '💬';
        if (/^\[AI\]/.test(entry)) { icon = '🗣️'; entry = entry.replace(/^\[AI\]\s*/, ''); }
        else if (/^\[USER\]/.test(entry)) { icon = '👤'; entry = entry.replace(/^\[USER\]\s*/, ''); }
        else if (/^\[SYSTEM\]/.test(entry)) { icon = '⚙️'; entry = entry.replace(/^\[SYSTEM\]\s*/, ''); }
        else if (/^\[NOTE\]/.test(entry)) { icon = '📝'; entry = entry.replace(/^\[NOTE\]\s*/, ''); }
        return icon + ' ' + esc(trunc(entry, 80));
      }
      if (type === 'voice.tool_call') return '🔧 <span class="hl">' + esc(data.tool || '') + '</span>' + (data.summary ? ' — ' + esc(trunc(data.summary, 40)) : '');
      if (type === 'voice.started') return '🎙️ Connected <span class="hl">(' + esc(data.provider || '') + ')</span>';
      if (type === 'voice.stopped') return '🔇 Session ended';
      if (type === 'presentation.slide') return '📊 ' + esc(trunc(data.title || data.text || '', 50));

      // S2 Agent Panel — intent + search + actions with icons
      if (type === 'auditor.intent') return '🎯 Intent: <span class="hl">' + esc(data.action || data.intent || '') + '</span>' + (data.confidence ? ' (' + Math.round(data.confidence * 100) + '%)' : '');
      if (type === 'auditor.executing') return '⚡ Executing: <span class="hl">' + esc(data.action || '') + '</span>';
      if (type === 'auditor.fast_lane') return '⚡ Fast: ' + esc(data.action || '');
      if (type === 'auditor.suggest') return '💡 Suggest: ' + esc(trunc(data.action || '', 50));
      if (type === 'retriever.topic') return '🔍 Topic: <span class="hl">' + esc(trunc(data.topic || '', 40)) + '</span>';
      if (type === 'retriever.searching') return '🔍 Searching: ' + esc(trunc(data.query || '', 40));
      if (type === 'retriever.complete') return '📂 Found ' + (data.results || 0) + ' results';
      if (type === 'computer.task_started') return '🖥️ <span class="hl">' + esc(trunc(data.instruction || data.task || '', 50)) + '</span>';
      if (type === 'computer.task_done') return '✅ Done: ' + esc(trunc(data.summary || '', 50));
      if (type === 'meeting.prep_ready') return '📋 Prep materials ready';
      // Research task events (3-layer model delegation)
      if (type === 'research.started') return '🔍 <span class="hl">Research:</span> ' + esc(trunc(data.query || '', 50)) + ' <span style="color:var(--yellow)">⏳ running</span>';
      if (type === 'research.progress') return '🔍 ' + esc(trunc(data.step || '', 60));
      if (type === 'research.completed') return data.error ? '🔍 ❌ ' + esc(trunc(data.error, 50)) : '🔍 ✅ <span class="hl">Research complete</span> — ' + esc(trunc(data.resultPreview || '', 40));

      // Fallback for other events
      if (type === 'meeting.started') return '<span class="hl">joined</span>';
      if (type === 'meeting.vision') return esc(trunc(data.description || data.scene || '', 60));
      if (type === 'meeting.context_pushed') return 'source: <span class="hl">' + esc(data.source || '') + '</span>';
      if (type === 'meeting.action_item') return esc(trunc(data.text || '', 60));
      if (type === 'computer.task_done') return (data.error ? 'ERR ' : '') + esc(trunc(data.summary || data.error || '', 60));
      if (type === 'openclaw.delta') return esc(trunc(data.text || '', 80));
      if (type === 'opencli.adapter_start') return '<span class="hl">' + esc(data.adapter || '') + '</span>';
      if (type === 'opencli.adapter_done') return esc(data.adapter || '') + ' (' + (data.duration || '?') + 'ms)';
      if (type === 'opencli.operate_start') return '<span class="hl">' + esc(trunc(data.goal || '', 60)) + '</span>';
      if (type === 'browser_loop.started') return '<span class="hl">' + esc(trunc(data.goal || '', 50)) + '</span>';
      if (type === 'browser_loop.step') return esc(trunc(data.action || '', 50));
      if (type === 'browser_loop.done') return '<span class="hl">complete</span>';
      if (type === 'presentation.slide') return 'slide ' + (data.index || '?') + '/' + (data.total || '?');
      var keys = Object.keys(data);
      for (var i = 0; i < Math.min(keys.length, 2); i++) {
        var v = data[keys[i]];
        if (typeof v === 'string' && v.length > 0) return esc(trunc(v, 50));
      }
      return '';
    }

    // ── Append log entry to a model panel ────────────
    function appendLog(panelId, type, data, ts) {
      var log = document.getElementById(panelId);
      var empty = log.querySelector('.log-empty');
      if (empty) empty.remove();

      var entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML =
        '<span class="log-time">' + timeStr(ts) + '</span>' +
        '<span class="log-type">' + esc(type) + '</span>' +
        '<span class="log-detail">' + fmtDetail(type, data) + '</span>';
      log.appendChild(entry);

      // Auto-scroll
      log.scrollTop = log.scrollHeight;

      // Prune
      while (log.children.length > MAX_LOG) {
        log.removeChild(log.firstChild);
      }
    }

    // ── Update model status indicators ───────────────
    function setModelStatus(sys, status, state) {
      var ind = document.getElementById(sys + '-ind');
      var label = document.getElementById(sys + '-status');
      var panel = document.getElementById('panel-' + sys);
      ind.className = 'indicator' + (state ? ' ' + state : '');
      label.textContent = status;
      panel.classList.toggle('active', !!state);
    }

    // ── Update breathing glow state ──────────────────
    function setGlow(state) {
      var outer = document.getElementById('slideOuter');
      outer.className = 'slide-frame-outer' + (state ? ' ' + state : '');
    }

    // ── Process incoming event ───────────────────────
    function processEvent(evt) {
      var type = evt.type;
      var data = evt.data || {};
      var ts = evt.timestamp || Date.now();

      // Route to correct panel
      if (isSystem1(type)) {
        appendLog('s1-log', type, data, ts);
      }
      if (isSystem2(type)) {
        appendLog('s2-log', type, data, ts);
      }

      // Update S1 status
      if (type === 'voice.started') {
        setModelStatus('s1', 'Listening', 'active');
        setGlow('active');
      } else if (type === 'voice.stopped') {
        setModelStatus('s1', 'Idle', '');
        setGlow('');
      } else if (type === 'voice.tool_call') {
        setModelStatus('s1', 'Tool: ' + (data.tool || ''), 'thinking');
        setGlow('thinking');
        setTimeout(function() { setModelStatus('s1', 'Listening', 'active'); setGlow('active'); }, 3000);
      } else if (type === 'retriever.searching') {
        setModelStatus('s1', 'Recalling...', 'thinking');
        setGlow('thinking');
      } else if (type === 'retriever.complete') {
        setModelStatus('s1', 'Listening', 'active');
        setGlow('active');
      }

      // Update S2 status
      if (type === 'computer.task_started') {
        setModelStatus('s2', 'Working', 'thinking');
        setGlow('thinking');
      } else if (type === 'computer.task_done') {
        setModelStatus('s2', 'Done', 'active');
        setTimeout(function() { setModelStatus('s2', 'Idle', ''); }, 5000);
      } else if (type === 'openclaw.delta') {
        setModelStatus('s2', 'Reasoning...', 'thinking');
      } else if (type === 'browser_loop.started') {
        setModelStatus('s2', 'Browsing', 'thinking');
        setGlow('thinking');
      } else if (type === 'browser_loop.done') {
        setModelStatus('s2', 'Done', 'active');
        setTimeout(function() { setModelStatus('s2', 'Idle', ''); setGlow('active'); }, 3000);
      } else if (type === 'opencli.adapter_start') {
        setModelStatus('s2', 'Adapter: ' + (data.adapter || ''), 'thinking');
      } else if (type === 'opencli.adapter_done') {
        setModelStatus('s2', 'Done', 'active');
        setTimeout(function() { setModelStatus('s2', 'Idle', ''); }, 3000);
      }

      // Track documents
      var docPath = null, badge = null;
      if (type === 'meeting.prep_ready' && data.filepath) { docPath = data.filepath; badge = 'new'; }
      else if (type === 'meeting.summary_ready' && data.filepath) { docPath = data.filepath; badge = 'new'; }
      else if (type === 'workspace.updated' && data.file) { docPath = data.file; badge = 'modified'; }
      if (docPath) {
        var name = docPath.split('/').pop() || docPath;
        documents.set(docPath, { name: name, badge: badge, ts: Date.now() });
        renderDocs();
      }

      // Meeting name
      if (type === 'meeting.started' && data.title) {
        document.getElementById('meetingName').textContent = data.title;
      }
    }

    // SVG icons for file types
    var FILE_ICONS = {
      md: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#6b7280" stroke-width="1.5"/><path d="M7 10l2 2 4-4" stroke="#4aa682" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      pdf: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#dc4a3a" stroke-width="1.5"/><text x="10" y="13" text-anchor="middle" fill="#dc4a3a" font-size="6" font-weight="700" font-family="Inter">PDF</text></svg>',
      html: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#6366f1" stroke-width="1.5"/><text x="10" y="12.5" text-anchor="middle" fill="#6366f1" font-size="5.5" font-weight="600" font-family="Inter">&lt;/&gt;</text></svg>',
      docx: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#2563eb" stroke-width="1.5"/><text x="10" y="13" text-anchor="middle" fill="#2563eb" font-size="5.5" font-weight="700" font-family="Inter">W</text></svg>',
      xlsx: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#16a34a" stroke-width="1.5"/><path d="M7 7h6M7 10h6M7 13h6" stroke="#16a34a" stroke-width="1" stroke-linecap="round"/></svg>',
      gdoc: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#4285f4" stroke-width="1.5"/><path d="M7 7h6M7 10h4" stroke="#4285f4" stroke-width="1.2" stroke-linecap="round"/></svg>',
      gsheet: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#0f9d58" stroke-width="1.5"/><path d="M7 7h6M7 10h6M7 13h6M11 7v6" stroke="#0f9d58" stroke-width="1" stroke-linecap="round"/></svg>',
      gdrive: '<svg viewBox="0 0 20 20" fill="none"><path d="M7 3l6 10H3l6-10z" stroke="#f4b400" stroke-width="1.3" fill="none"/><path d="M13 13l3-5H7" stroke="#4285f4" stroke-width="1.3" fill="none"/></svg>',
      json: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#d97706" stroke-width="1.5"/><text x="10" y="13" text-anchor="middle" fill="#d97706" font-size="5.5" font-weight="600" font-family="Inter">{}</text></svg>',
      ts: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#3178c6" stroke-width="1.5"/><text x="10" y="13" text-anchor="middle" fill="#3178c6" font-size="6" font-weight="700" font-family="Inter">TS</text></svg>',
      js: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#f7df1e" stroke-width="1.5"/><text x="10" y="13" text-anchor="middle" fill="#b8a200" font-size="6" font-weight="700" font-family="Inter">JS</text></svg>',
      png: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#8b5cf6" stroke-width="1.5"/><circle cx="8" cy="8" r="2" stroke="#8b5cf6" stroke-width="1"/><path d="M3 14l4-3 3 2 3-4 4 5" stroke="#8b5cf6" stroke-width="1" fill="none"/></svg>',
      default: '<svg viewBox="0 0 20 20" fill="none"><rect x="3" y="2" width="14" height="16" rx="2" stroke="#9ca3af" stroke-width="1.5"/><path d="M7 7h6M7 10h6M7 13h3" stroke="#9ca3af" stroke-width="1" stroke-linecap="round"/></svg>'
    };

    function getFileIcon(name) {
      var ext = (name.split('.').pop() || '').toLowerCase();
      // Google Drive / Workspace URL detection
      if (name.includes('docs.google.com/document') || name.includes('gdoc') || name.includes('Google Doc')) return FILE_ICONS.gdoc;
      if (name.includes('docs.google.com/spreadsheets') || name.includes('gsheet') || name.includes('Google Sheet')) return FILE_ICONS.gsheet;
      if (name.includes('drive.google.com') || name.includes('gdrive') || name.includes('Google Drive')) return FILE_ICONS.gdrive;
      return FILE_ICONS[ext] || FILE_ICONS.default;
    }

    function renderDocs() {
      var list = document.getElementById('docList');
      list.innerHTML = '';
      var sorted = Array.from(documents.entries()).sort(function(a, b) { return b[1].ts - a[1].ts; });
      sorted.forEach(function(entry) {
        var doc = entry[1];
        var row = document.createElement('div');
        row.className = 'doc-row';
        row.innerHTML =
          '<span class="doc-icon">' + getFileIcon(doc.name) + '</span>' +
          '<span class="doc-name">' + esc(doc.name) + '</span>' +
          (doc.badge ? '<span class="badge ' + doc.badge + '">' + doc.badge + '</span>' : '');
        list.appendChild(row);
      });
    }

    // ── Slide player control ─────────────────────────
    function slideAction(dir) {
      fetch(API + '/api/screen/scroll', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ direction: dir === 'next' ? 'down' : 'up' })
      }).catch(function() {});
    }

    // ── WebSocket connection ─────────────────────────
    function connectWS() {
      try {
        ws = new WebSocket(WS_URL);
        ws.onopen = function() {
          DEMO_MODE = false; // real backend connected, stop demo
          // Cancel pending demo timer so demo data never appears
          if (_demoTimer) { clearTimeout(_demoTimer); _demoTimer = null; }
          // Clear any demo documents that may have sneaked in
          documents.clear();
          renderDocs();
          var status = document.getElementById('wsStatus');
          status.className = 'stage-status connected';
          document.getElementById('wsStatusText').textContent = 'Live';
          // Fetch real documents and meeting status from backend
          fetchRealDocuments();
          fetchMeetingStatus();
        };
        ws.onmessage = function(e) {
          try { processEvent(JSON.parse(e.data)); } catch (err) {}
        };
        ws.onclose = function() {
          document.getElementById('wsStatus').className = 'stage-status disconnected';
          document.getElementById('wsStatusText').textContent = 'Reconnecting';
          setTimeout(connectWS, 3000);
        };
        ws.onerror = function() {};
      } catch (e) {
        // WS not available, keep demo mode
        setTimeout(connectWS, 5000);
      }
    }
    connectWS();

    // ── URL params ───────────────────────────────────
    var params = new URLSearchParams(window.location.search);
    if (params.get('slide')) {
      document.getElementById('slideFrame').src = params.get('slide');
      document.getElementById('slidePlaceholder').style.display = 'none';
      document.getElementById('slideNav').style.display = '';
    }
    if (params.get('meeting')) {
      document.getElementById('meetingName').textContent = params.get('meeting');
    }

    // ── Fetch real documents from backend on load ─────
    function fetchRealDocuments() {
      fetch(API + '/api/stage/documents')
        .then(function(r) { return r.json(); })
        .then(function(body) {
          var docs = body.documents || [];
          if (docs.length > 0) {
            documents.clear();
            docs.forEach(function(d) {
              documents.set(d.path, { name: d.name, badge: d.badge || null, ts: d.addedAt || Date.now() });
            });
            renderDocs();
          }
        })
        .catch(function() { /* backend not ready yet */ });
    }

    // ── Fetch real meeting status on load ────────────
    function fetchMeetingStatus() {
      fetch(API + '/api/status')
        .then(function(r) { return r.json(); })
        .then(function(body) {
          // body.meeting is a string ("idle"/"recording"), not an object
          // Topic is in voiceSession or workspace context
          var topic = (body.voiceSession && body.voiceSession.topic)
            || (body.workspace && body.workspace.topic)
            || null;
          if (topic) {
            document.getElementById('meetingName').textContent = topic;
          } else if (body.meeting === 'recording') {
            document.getElementById('meetingName').textContent = 'Meeting in Progress';
          }
        })
        .catch(function() { /* backend not ready yet */ });
    }

    // ══════════════════════════════════════════════════
    // DEMO MODE — Simulated events (deferred: only runs
    // if WebSocket has NOT connected after 3 seconds)
    // ══════════════════════════════════════════════════
    var _demoTimer = setTimeout(function() {
      if (!DEMO_MODE) return; // WS already connected, skip demo

      document.getElementById('meetingName').textContent = 'Weekly Standup';
      // Demo documents — various file types
      documents.set('/prep/weekly_standup_prep.md', { name: 'weekly_standup_prep.md', badge: 'new', ts: Date.now() });
      documents.set('/gdrive/Q1 Sprint Review.gdoc', { name: 'Q1 Sprint Review (Google Doc)', badge: null, ts: Date.now() - 1000 });
      documents.set('/meetings/summary.html', { name: 'meeting_summary.html', badge: 'modified', ts: Date.now() - 2000 });
      documents.set('/gdrive/Sprint Metrics.gsheet', { name: 'Sprint Metrics (Google Sheet)', badge: null, ts: Date.now() - 3000 });
      documents.set('/docs/auth-migration-rfc.pdf', { name: 'auth-migration-rfc.pdf', badge: 'new', ts: Date.now() - 4000 });
      documents.set('/docs/api-spec.json', { name: 'api-spec.json', badge: null, ts: Date.now() - 5000 });
      renderDocs();

      // ── S1 event sequences ──
      var s1Events = [
        { type: 'voice.started', data: { provider: 'openai', audio_mode: 'meet_bridge' } },
        { type: 'meeting.started', data: { title: 'Weekly Standup', meetingId: 'cc_042' } },
        { type: 'meeting.prep_ready', data: { filepath: '~/.callingclaw/shared/prep/weekly_standup_prep.md' } },
        { type: 'meeting.context_pushed', data: { source: 'meeting_prep', tokens: 480 } },
        { type: 'auditor.intent', data: { intent: 'status_update' } },
        { type: 'voice.tool_call', data: { tool: 'recall_context', summary: 'Searching for sprint velocity metrics from last 3 sprints' } },
        { type: 'retriever.topic', data: { topic: 'sprint velocity' } },
        { type: 'retriever.searching', data: { query: 'sprint velocity metrics Q1 2026' } },
        { type: 'retriever.complete', data: { results: 3, source: 'knowledge_base' } },
        { type: 'meeting.context_pushed', data: { source: 'retriever', tokens: 320 } },
        { type: 'auditor.intent', data: { intent: 'question_about_blocker' } },
        { type: 'voice.tool_call', data: { tool: 'check_calendar', summary: 'Looking up design review scheduled this week' } },
        { type: 'meeting.vision', data: { description: 'Screen shows Jira board with 3 tickets in review column, 2 in progress' } },
        { type: 'meeting.context_pushed', data: { source: 'vision', tokens: 150 } },
        { type: 'auditor.fast_lane', data: { action: 'note_action_item' } },
        { type: 'meeting.action_item', data: { text: 'Follow up with design team on component library review by Friday' } },
        { type: 'voice.tool_call', data: { tool: 'share_screen', summary: 'Sharing sprint burndown chart' } },
        { type: 'presentation.slide', data: { index: 1, total: 4, slide: 'Sprint Burndown' } },
        { type: 'presentation.slide', data: { index: 2, total: 4, slide: 'Velocity Trend' } },
        { type: 'meeting.action_item', data: { text: 'Schedule architecture review for new auth service next Tuesday' } },
        { type: 'retriever.topic', data: { topic: 'auth service RFC' } },
        { type: 'retriever.searching', data: { query: 'auth service architecture proposal RFC' } },
        { type: 'retriever.complete', data: { results: 1, source: 'shared_docs' } },
        { type: 'auditor.intent', data: { intent: 'wrap_up_discussion' } },
        { type: 'voice.tool_call', data: { tool: 'create_todo', summary: 'Creating action items from meeting notes' } },
      ];

      // ── S2 event sequences ──
      var s2Events = [
        { type: 'computer.task_started', data: { instruction: 'Analyze sprint metrics and prepare burndown visualization' } },
        { type: 'openclaw.delta', data: { text: 'Reading sprint data from Jira API...' } },
        { type: 'openclaw.delta', data: { text: 'Calculating velocity: avg 42 story points per sprint over last 3 sprints' } },
        { type: 'openclaw.delta', data: { text: 'Generating burndown chart with matplotlib...' } },
        { type: 'opencli.adapter_start', data: { adapter: 'jira-sprint-metrics' } },
        { type: 'opencli.adapter_done', data: { adapter: 'jira-sprint-metrics', duration: 1240, success: true } },
        { type: 'computer.task_done', data: { summary: 'Sprint burndown chart saved to /tmp/burndown.html' } },
        { type: 'computer.task_started', data: { instruction: 'Research auth service migration patterns for architecture review' } },
        { type: 'openclaw.delta', data: { text: 'Searching codebase for current auth implementation...' } },
        { type: 'openclaw.delta', data: { text: 'Found 3 auth middleware files, analyzing token storage pattern...' } },
        { type: 'browser_loop.started', data: { goal: 'Look up OAuth 2.1 best practices for session token storage' } },
        { type: 'browser_loop.step', data: { action: 'navigate to oauth.net/2.1 security recommendations' } },
        { type: 'browser_loop.step', data: { action: 'extract token storage guidelines from IETF draft' } },
        { type: 'browser_loop.done', data: { result: 'Extracted 5 key recommendations for token storage' } },
        { type: 'openclaw.delta', data: { text: 'Comparing current implementation against IETF recommendations...' } },
        { type: 'openclaw.delta', data: { text: 'Writing auth migration RFC draft with 3 options...' } },
        { type: 'computer.task_done', data: { summary: 'Auth RFC draft saved to shared/docs/auth-migration-rfc.md' } },
        { type: 'computer.task_started', data: { instruction: 'Generate meeting summary with action items and decisions' } },
        { type: 'openclaw.delta', data: { text: 'Parsing transcript for key decisions and action items...' } },
        { type: 'openclaw.delta', data: { text: 'Found 2 decisions, 4 action items, 1 open question' } },
        { type: 'openclaw.delta', data: { text: 'Formatting HTML summary with embedded screenshots...' } },
      ];

      var s1Idx = 0, s2Idx = 0;

      function emitS1() {
        if (!DEMO_MODE || s1Idx >= s1Events.length) {
          if (DEMO_MODE) { s1Idx = 0; setTimeout(emitS1, 8000); } // loop
          return;
        }
        var evt = s1Events[s1Idx++];
        evt.timestamp = Date.now();
        processEvent(evt);
        var delay = 1500 + Math.random() * 3000; // 1.5-4.5s between events
        setTimeout(emitS1, delay);
      }

      function emitS2() {
        if (!DEMO_MODE || s2Idx >= s2Events.length) {
          if (DEMO_MODE) { s2Idx = 0; setTimeout(emitS2, 12000); } // loop, slower
          return;
        }
        var evt = s2Events[s2Idx++];
        evt.timestamp = Date.now();
        processEvent(evt);
        var delay = 2000 + Math.random() * 4000; // 2-6s between events
        setTimeout(emitS2, delay);
      }

      // Start demo with staggered timing
      setTimeout(emitS1, 800);
      setTimeout(emitS2, 2500);
    }, 3000);
  </script>
