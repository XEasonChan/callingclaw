<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallingClaw — Voice Test</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
      --border: #2a2a2a; --text: #e5e5e5; --text2: #888; --text3: #555;
      --accent: #6366f1; --accent-dim: #4f46e5;
      --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6;
      --radius: 12px; --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg); color: var(--text); height: 100vh;
      display: flex; flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--surface2); color: var(--text2);
    }
    .header .badge.connected { background: rgba(34,197,94,0.15); color: var(--green); }
    .header .back { color: var(--text2); text-decoration: none; font-size: 13px; margin-right: 8px; }
    .header .back:hover { color: var(--text); }

    /* Main layout */
    .main { flex: 1; display: flex; overflow: hidden; }
    .panel-left { width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
    .panel-right { flex: 1; display: flex; flex-direction: column; }

    /* Controls */
    .controls { padding: 20px; }
    .control-group { margin-bottom: 16px; }
    .control-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; font-weight: 500; display: flex; align-items: center; justify-content: space-between; }
    select, input[type="text"] {
      width: 100%; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 13px; outline: none;
    }
    select:focus, input:focus { border-color: var(--accent); }
    textarea {
      width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 12px; font-family: 'SF Mono', monospace;
      outline: none; resize: vertical; line-height: 1.5;
    }
    textarea:focus { border-color: var(--accent); }

    .btn {
      padding: 10px 24px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.15s; display: inline-flex; align-items: center; gap: 8px;
    }
    .btn-start { background: var(--green); color: #fff; width: 100%; justify-content: center; }
    .btn-start:hover { background: #16a34a; }
    .btn-stop { background: var(--red); color: #fff; width: 100%; justify-content: center; }
    .btn-stop:hover { background: #dc2626; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); padding: 6px 12px; font-size: 12px; }
    .btn-ghost:hover { background: var(--surface2); color: var(--text); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Mic level */
    .mic-bar-container {
      height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 8px; overflow: hidden;
    }
    .mic-bar {
      height: 100%; width: 0%; background: var(--green); border-radius: 2px;
      transition: width 50ms linear;
    }
    .mic-bar.active { background: var(--green); }

    /* Transcript */
    .transcript-area { flex: 1; overflow-y: auto; padding: 20px; }
    .transcript-entry { margin-bottom: 12px; animation: fadeIn 0.2s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
    .transcript-role {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .transcript-role.user { color: var(--blue); }
    .transcript-role.assistant { color: var(--green); }
    .transcript-role.system { color: var(--yellow); }
    .transcript-text { font-size: 14px; line-height: 1.6; color: var(--text); }
    .transcript-time { font-size: 10px; color: var(--text3); margin-top: 2px; }
    .transcript-empty {
      display: flex; align-items: center; justify-content: center; height: 100%;
      color: var(--text3); font-size: 14px;
    }

    /* Voice visualizer */
    .voice-viz {
      height: 60px; display: flex; align-items: center; justify-content: center;
      gap: 3px; padding: 0 20px; border-top: 1px solid var(--border);
    }
    .voice-viz .bar {
      width: 3px; background: var(--accent); border-radius: 2px; transition: height 80ms ease;
      height: 4px;
    }
    .voice-viz.speaking .bar { animation: voicePulse 0.6s ease-in-out infinite alternate; }
    @keyframes voicePulse {
      0% { height: 4px; opacity: 0.3; }
      100% { height: 32px; opacity: 1; }
    }

    /* Text input */
    .text-input-bar {
      padding: 12px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 8px;
    }
    .text-input-bar input { flex: 1; }

    /* Layer toggles */
    .layer-section { padding: 0 20px 20px; border-top: 1px solid var(--border); }
    .layer-section-title {
      font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.5px; padding: 12px 0 8px; display: flex; justify-content: space-between;
    }
    .layer-row {
      display: flex; align-items: center; gap: 10px; padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }
    .layer-row:last-child { border-bottom: none; }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute; inset: 0; background: #333; border-radius: 10px;
      cursor: pointer; transition: background 0.2s;
    }
    .toggle .slider::before {
      content: ''; position: absolute; width: 16px; height: 16px;
      left: 2px; top: 2px; background: #888; border-radius: 50%;
      transition: all 0.2s;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(16px); background: #fff; }
    .toggle input:disabled + .slider { opacity: 0.4; cursor: not-allowed; }
    .layer-info { flex: 1; min-width: 0; }
    .layer-name { font-size: 13px; font-weight: 500; }
    .layer-meta { font-size: 11px; color: var(--text3); margin-top: 1px; }

    /* Collapsible */
    .collapsible-toggle {
      cursor: pointer; user-select: none; color: var(--accent); font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="/">← Panel</a>
    <h1>Voice Test / Talk Locally</h1>
    <span class="badge" id="status-badge">Disconnected</span>
    <span class="badge" id="ws-badge">WS: --</span>
  </div>

  <div class="main">
    <!-- Left: Controls -->
    <div class="panel-left">
      <div class="controls">
        <!-- Provider select -->
        <div class="control-group">
          <div class="control-label">Provider</div>
          <select id="provider-select">
            <option value="openai">OpenAI</option>
            <option value="grok">Grok (xAI)</option>
          </select>
        </div>

        <!-- Voice select -->
        <div class="control-group">
          <div class="control-label">Voice</div>
          <select id="voice-select">
            <!-- Populated dynamically by rebuildVoiceList() -->
          </select>
        </div>

        <!-- Session Mode -->
        <div class="control-group">
          <div class="control-label">Mode</div>
          <select id="mode-select" onchange="onModeChange()">
            <option value="test">Voice Test (minimal context)</option>
            <option value="local" selected>Talk Locally (full AI memory)</option>
          </select>
        </div>

        <!-- Meeting Context -->
        <div class="control-group" id="meeting-context-group">
          <div class="control-label">
            Meeting Context
            <span id="meeting-prep-status" style="font-size: 11px; font-weight: 400; color: var(--text3);"></span>
          </div>
          <select id="meeting-select" onchange="onMeetingChange()">
            <option value="">No meeting — free conversation</option>
          </select>
          <div id="meeting-brief-preview" style="display:none; margin-top: 8px; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; color: var(--text2); max-height: 120px; overflow-y: auto; line-height: 1.5;"></div>
        </div>

        <!-- Instructions -->
        <div class="control-group">
          <div class="control-label">
            System Instructions
            <span class="collapsible-toggle" id="instr-toggle" onclick="toggleInstructions()">expand</span>
          </div>
          <textarea id="instructions" rows="3" placeholder="Leave empty to use production CORE_IDENTITY prompt..."></textarea>
          <div id="instr-full" style="display:none; margin-top: 8px;">
            <button class="btn btn-ghost" onclick="updateInstructions()">Update Instructions</button>
            <span id="instr-status" style="font-size: 11px; color: var(--text3); margin-left: 8px;"></span>
          </div>
        </div>

        <!-- Mic device select -->
        <div class="control-group">
          <div class="control-label">Microphone</div>
          <select id="mic-select" style="margin-bottom: 6px;">
            <option value="">System Default</option>
          </select>
          <div class="mic-bar-container">
            <div class="mic-bar" id="mic-bar"></div>
          </div>
        </div>

        <!-- Start/Stop -->
        <div class="control-group">
          <button class="btn btn-start" id="btn-start" onclick="startSession()">Start Voice Session</button>
          <button class="btn btn-stop" id="btn-stop" onclick="stopSession()" style="display:none">Stop</button>
        </div>
      </div>

      <!-- Layer Toggles -->
      <div class="layer-section">
        <div class="layer-section-title">
          Capability Layers
          <span id="layer-count" style="font-size: 11px; font-weight: 400; color: var(--text3);">0/14 tools</span>
        </div>
        <div id="layers-container">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>

    <!-- Right: Transcript -->
    <div class="panel-right">
      <div class="transcript-area" id="transcript">
        <div class="transcript-empty">Start a voice session to begin talking with CallingClaw AI</div>
      </div>

      <!-- Voice visualizer -->
      <div class="voice-viz" id="voice-viz">
        <script>for(let i=0;i<24;i++)document.write('<div class="bar" style="animation-delay:'+(i*0.05)+'s"></div>')</script>
      </div>

      <!-- Text input -->
      <div class="text-input-bar">
        <input type="text" id="text-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendText()">
        <button class="btn btn-ghost" onclick="sendText()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // ═══════════════════════════════════════════════════════
    // Voice Test — Browser Audio + WebSocket Relay
    // ═══════════════════════════════════════════════════════

    const API = location.origin;
    const WS_URL = `ws://${location.host}/ws/voice-test`;

    let ws = null;
    let audioCtx = null;
    let micStream = null;
    let micSource = null;
    let micProcessor = null;
    let micAnalyser = null;
    let playbackQueue = [];
    let playbackNode = null;
    let isPlaying = false;
    let sessionActive = false;
    let captureCtx = null; // Separate AudioContext for mic capture (native rate)

    // ── Voice lists per provider ──
    const VOICES = {
      openai: [
        { value: 'alloy', label: 'Alloy' }, { value: 'ash', label: 'Ash' },
        { value: 'ballad', label: 'Ballad' }, { value: 'coral', label: 'Coral' },
        { value: 'echo', label: 'Echo' }, { value: 'fable', label: 'Fable' },
        { value: 'marin', label: 'Marin' }, { value: 'nova', label: 'Nova' },
        { value: 'onyx', label: 'Onyx' }, { value: 'sage', label: 'Sage' },
        { value: 'shimmer', label: 'Shimmer' }, { value: 'verse', label: 'Verse' },
      ],
      grok: [
        { value: 'Eve', label: 'Eve' }, { value: 'Ara', label: 'Ara' },
        { value: 'Rex', label: 'Rex' }, { value: 'Sal', label: 'Sal' },
        { value: 'Leo', label: 'Leo' },
      ],
    };
    const DEFAULT_VOICE = { openai: 'marin', grok: 'Eve' };

    function rebuildVoiceList(provider) {
      const select = document.getElementById('voice-select');
      select.innerHTML = '';
      const voices = VOICES[provider] || VOICES.openai;
      const def = DEFAULT_VOICE[provider] || voices[0].value;
      voices.forEach(function(v) {
        const opt = document.createElement('option');
        opt.value = v.value; opt.textContent = v.label;
        if (v.value === def) opt.selected = true;
        select.appendChild(opt);
      });
    }

    // ── Mic device enumeration ──
    async function enumerateMics() {
      try {
        // Need a temp getUserMedia to get labeled devices
        const tempStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        tempStream.getTracks().forEach(t => t.stop());
        const devices = await navigator.mediaDevices.enumerateDevices();
        const mics = devices.filter(d => d.kind === 'audioinput');
        const select = document.getElementById('mic-select');
        select.innerHTML = '<option value="">System Default</option>';
        mics.forEach(function(d) {
          const opt = document.createElement('option');
          opt.value = d.deviceId;
          opt.textContent = d.label || ('Mic ' + d.deviceId.slice(0, 8));
          // Auto-select real mic (skip BlackHole/virtual)
          if (d.label && !d.label.includes('BlackHole') && !d.label.includes('Virtual') && select.value === '') {
            opt.selected = true;
          }
          select.appendChild(opt);
        });
      } catch (e) { console.warn('[VoiceTest] Mic enumeration failed:', e); }
    }

    document.addEventListener('DOMContentLoaded', function() {
      var providerSelect = document.getElementById('provider-select');
      // Set initial provider from server VOICE_PROVIDER config
      fetch(API + '/api/status').then(function(r) { return r.json(); }).then(function(d) {
        // Use configured voiceProvider or session provider
        var prov = (d.voiceSession && d.voiceSession.provider) || null;
        if (prov) providerSelect.value = prov;
        rebuildVoiceList(providerSelect.value);
      }).catch(function() { rebuildVoiceList(providerSelect.value); });
      rebuildVoiceList(providerSelect.value);
      providerSelect.addEventListener('change', function() {
        rebuildVoiceList(this.value);
      });
      // Enumerate mic devices
      enumerateMics();
      // Load meeting list for Talk Locally mode
      loadMeetingList();
      // Set initial mode UI
      onModeChange();
    });

    // ── Meeting list + context loading ──
    let meetingList = []; // { id, summary, start, end, hangoutLink, meetingId, hasPrepBrief }
    let selectedMeetingBrief = null; // cached prep markdown

    async function loadMeetingList() {
      const select = document.getElementById('meeting-select');
      const statusEl = document.getElementById('meeting-prep-status');
      try {
        // 1. Fetch from ALL sources in parallel
        const [evtRes, notesRes] = await Promise.all([
          fetch(`${API}/api/calendar/events`).then(r => r.json()).catch(() => ({ events: [] })),
          fetch(`${API}/api/meeting/notes`).then(r => r.json()).catch(() => ({ files: [] })),
        ]);

        const calEvents = Array.isArray(evtRes) ? evtRes : (evtRes.events || []);
        const noteFiles = Array.isArray(notesRes) ? notesRes : (notesRes.files || []);

        // 2. Build meeting list from calendar events
        const seen = new Set(); // dedup by title
        meetingList = [];

        for (const e of calEvents) {
          const summary = e.summary || e.title || 'Untitled';
          // Extract meetingId from _prepBrief filename (e.g. "cc_xxx_prep.md" → "cc_xxx")
          let meetingId = e.meetingId || null;
          if (!meetingId && e._prepBrief && e._prepBrief.endsWith('_prep.md')) {
            meetingId = e._prepBrief.replace('_prep.md', '');
          }
          meetingList.push({
            id: e.id,
            summary: summary,
            start: e.start?.dateTime || e.start || e.startTime || '',
            end: e.end?.dateTime || e.end || e.endTime || '',
            hangoutLink: e.hangoutLink || e.meetLink || null,
            meetingId: meetingId,
            hasPrepBrief: !!e._prepBrief,
            source: 'calendar',
            noteFile: null,
          });
          seen.add(summary.toLowerCase());
        }

        // 3. Add meetings from notes that aren't already in calendar
        // Note filename format: YYYY-MM-DD_HHMM_Title.md
        for (const f of noteFiles) {
          const fname = typeof f === 'string' ? f : (f.name || f.filename || '');
          const m = fname.match(/^(\d{4}-\d{2}-\d{2})_(\d{2})(\d{2})_(.+)\.md$/);
          if (!m) continue;
          const date = m[1], hour = m[2], min = m[3], title = m[4].replace(/_/g, ' ');
          if (seen.has(title.toLowerCase())) continue; // skip duplicates
          seen.add(title.toLowerCase());
          meetingList.push({
            id: null,
            summary: title,
            start: `${date}T${hour}:${min}:00`,
            end: '',
            hangoutLink: null,
            meetingId: null,
            hasPrepBrief: false,
            source: 'notes',
            noteFile: fname,
          });
        }

        // 4. Sort by date (newest first)
        meetingList.sort(function(a, b) {
          return (b.start || '').localeCompare(a.start || '');
        });

        // 5. Render dropdown
        select.innerHTML = '<option value="">No meeting — free conversation</option>';
        meetingList.forEach(function(m, i) {
          const opt = document.createElement('option');
          opt.value = i;
          const timeStr = m.start ? new Date(m.start).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }) : '';
          const dateStr = m.start ? new Date(m.start).toLocaleDateString('zh-CN', { month: 'short', day: 'numeric' }) : '';
          const srcTag = m.source === 'notes' ? ' 📝' : ' 📅';
          opt.textContent = `${dateStr} ${timeStr} — ${m.summary}${srcTag}`;
          select.appendChild(opt);
        });

        statusEl.textContent = meetingList.length + ' meetings';
      } catch (e) {
        statusEl.textContent = 'Failed to load';
        console.warn('[VoiceTest] Meeting list failed:', e);
      }
    }

    async function onMeetingChange() {
      const select = document.getElementById('meeting-select');
      const preview = document.getElementById('meeting-brief-preview');
      const idx = parseInt(select.value);
      selectedMeetingBrief = null;

      if (isNaN(idx) || !meetingList[idx]) {
        preview.style.display = 'none';
        return;
      }

      const m = meetingList[idx];
      preview.style.display = '';
      preview.textContent = 'Loading...';

      // Try loading content: prep brief (by meetingId) → note file → nothing
      let content = null;

      // 1. Try prep brief by meetingId
      if (m.meetingId) {
        try {
          const r = await fetch(`${API}/api/shared/file?path=${encodeURIComponent(m.meetingId + '_prep.md')}`);
          const d = await r.json();
          if (d && d.content) content = d.content;
        } catch {}
      }

      // 2. Try meeting note file
      if (!content && m.noteFile) {
        try {
          const r = await fetch(`${API}/api/meeting/notes/${encodeURIComponent(m.noteFile)}`);
          const d = await r.json();
          if (d && (d.content || d.text)) content = d.content || d.text;
        } catch {}
      }

      if (content) {
        selectedMeetingBrief = content;
        preview.textContent = content.slice(0, 500) + (content.length > 500 ? '...' : '');
      } else {
        preview.textContent = 'No meeting notes or prep brief available.';
      }
    }

    function onModeChange() {
      const mode = document.getElementById('mode-select').value;
      const meetingGroup = document.getElementById('meeting-context-group');
      meetingGroup.style.display = mode === 'test' ? 'none' : '';
      // Update button label
      document.getElementById('btn-start').textContent = mode === 'local' ? 'Start Talk Locally' : 'Start Voice Session';
    }

    // ── Load config ──
    (async () => {
      try {
        const r = await fetch(`${API}/api/config`);
        const d = await r.json();
        if (d.openai_voice) document.getElementById('voice-select').value = d.openai_voice;
      } catch {}
      try {
        const r = await fetch(`${API}/api/voice/instructions`);
        const d = await r.json();
        if (d.instructions) document.getElementById('instructions').value = d.instructions;
      } catch {}
    })();

    // ── Toggle instructions ──
    function toggleInstructions() {
      const full = document.getElementById('instr-full');
      const ta = document.getElementById('instructions');
      const toggle = document.getElementById('instr-toggle');
      if (full.style.display === 'none') {
        full.style.display = 'block';
        ta.rows = 10;
        toggle.textContent = 'collapse';
      } else {
        full.style.display = 'none';
        ta.rows = 3;
        toggle.textContent = 'expand';
      }
    }

    // ── Update instructions mid-session ──
    async function updateInstructions() {
      const text = document.getElementById('instructions').value.trim();
      if (!text) return;
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'update_instructions', instructions: text }));
        document.getElementById('instr-status').textContent = 'sent';
        setTimeout(() => document.getElementById('instr-status').textContent = '', 2000);
      } else {
        // Fallback to REST
        try {
          await fetch(`${API}/api/voice/instructions`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ instructions: text })
          });
          document.getElementById('instr-status').textContent = 'updated';
        } catch {
          document.getElementById('instr-status').textContent = 'failed';
        }
        setTimeout(() => document.getElementById('instr-status').textContent = '', 2000);
      }
    }

    // ── Start session ──
    async function startSession() {
      const btnStart = document.getElementById('btn-start');
      const btnStop = document.getElementById('btn-stop');
      btnStart.disabled = true;
      btnStart.textContent = 'Connecting...';

      try {
        // 1. Get mic permission (use selected device if specified)
        const micDeviceId = document.getElementById('mic-select').value;
        const audioConstraints = { echoCancellation: true, noiseSuppression: true, channelCount: 1 };
        if (micDeviceId) audioConstraints.deviceId = { exact: micDeviceId };
        micStream = await navigator.mediaDevices.getUserMedia({ audio: audioConstraints });

        // 2. Set up TWO AudioContexts:
        //    - captureCtx: at hardware native rate (48kHz) for mic capture via AudioWorklet
        //      Forcing 24kHz causes MediaStreamSource to output silence in Edge/Safari.
        //    - audioCtx: at 24kHz for AI audio playback (matches Grok/OpenAI output)
        captureCtx = new AudioContext(); // native rate (usually 48kHz)
        audioCtx = new AudioContext({ sampleRate: 24000 }); // playback only
        if (captureCtx.state === 'suspended') await captureCtx.resume();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
        console.log(`[VoiceTest] Capture: ${captureCtx.sampleRate}Hz (AudioWorklet), Playback: ${audioCtx.sampleRate}Hz`);

        // 3. Set up mic capture via AudioWorklet (modern API, runs on audio thread)
        await captureCtx.audioWorklet.addModule('/pcm-processor-worklet.js');
        micSource = captureCtx.createMediaStreamSource(micStream);
        micAnalyser = captureCtx.createAnalyser();
        micAnalyser.fftSize = 256;
        micSource.connect(micAnalyser);

        const workletNode = new AudioWorkletNode(captureCtx, 'pcm-processor');
        micSource.connect(workletNode);
        micProcessor = workletNode; // store ref for cleanup

        const captureRate = captureCtx.sampleRate;
        const TARGET_RATE = 24000;

        // Chunked base64 encoder (avoids stack overflow on large buffers)
        function audioToBase64(int16Array) {
          const bytes = new Uint8Array(int16Array.buffer, int16Array.byteOffset, int16Array.byteLength);
          const CHUNK = 0x2000;
          const parts = [];
          for (let i = 0; i < bytes.length; i += CHUNK) {
            parts.push(String.fromCharCode.apply(null, bytes.subarray(i, i + CHUNK)));
          }
          return btoa(parts.join(''));
        }

        // Buffer mic audio until session is ready (captures first 200-700ms of speech)
        let micBuffer = [];
        let micSessionReady = false;

        workletNode.port.onmessage = (e) => {
          let int16Data = e.data; // Int16Array at captureRate

          // Downsample from native rate to 24kHz if needed
          if (captureRate !== TARGET_RATE && captureRate > TARGET_RATE) {
            const ratio = captureRate / TARGET_RATE;
            const newLen = Math.round(int16Data.length / ratio);
            const resampled = new Int16Array(newLen);
            for (let i = 0; i < newLen; i++) {
              resampled[i] = int16Data[Math.round(i * ratio)] || 0;
            }
            int16Data = resampled;
          }

          if (micSessionReady && sessionActive && ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'audio', audio: audioToBase64(int16Data) }));
          } else if (!micSessionReady) {
            micBuffer.push(int16Data);
            if (micBuffer.length > 240) micBuffer.shift(); // safety cap ~10s
          }
        };

        // Flush mic buffer when session becomes ready
        window._onSessionReady = function() {
          micSessionReady = true;
          for (const chunk of micBuffer) {
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: 'audio', audio: audioToBase64(chunk) }));
            }
          }
          micBuffer = [];
          console.log(`[VoiceTest] Mic buffer flushed, live streaming at ${TARGET_RATE}Hz`);
        };

        // 4. Scheduled BufferSource playback (no ScriptProcessor — eliminates pops/clicks)
        // Each incoming audio chunk is scheduled at an exact time on the audio thread.
        // Unlike ScriptProcessor, there are no chunk boundary discontinuities.
        let _nextPlayTime = 0;
        const _queuedSources = [];
        playbackNode = { _scheduledCount: 0 }; // dummy ref for cleanup

        window._scheduleAudioChunk = function(float32) {
          if (!audioCtx || audioCtx.state === 'closed') return;
          if (audioCtx.state === 'suspended') audioCtx.resume();

          // Micro fade-in/out (24 samples = 1ms) prevents DC offset clicks
          const FADE = 24;
          if (float32.length > FADE * 2) {
            for (let f = 0; f < FADE; f++) {
              const gain = f / FADE;
              float32[f] *= gain;
              float32[float32.length - 1 - f] *= gain;
            }
          }

          const buffer = audioCtx.createBuffer(1, float32.length, 24000);
          buffer.copyToChannel(float32, 0);

          const source = audioCtx.createBufferSource();
          source.buffer = buffer;
          source.connect(audioCtx.destination);

          const now = audioCtx.currentTime;
          // Only reset on new response (>2s behind). Small inter-sentence gaps
          // (200-500ms) schedule naturally to avoid "pushing" artifacts.
          if (_nextPlayTime < now - 2.0) {
            _nextPlayTime = now + 0.15; // new response
          } else if (_nextPlayTime < now) {
            _nextPlayTime = now + 0.02; // small underrun
          }

          source.start(_nextPlayTime);
          _nextPlayTime += float32.length / 24000;

          // Track for interruption
          _queuedSources.push(source);
          source.onended = () => {
            const idx = _queuedSources.indexOf(source);
            if (idx !== -1) _queuedSources.splice(idx, 1);
          };

          if (!isPlaying) {
            isPlaying = true;
            document.getElementById('voice-viz').classList.add('speaking');
          }
          clearTimeout(window._speechEndTimer);
          window._speechEndTimer = setTimeout(() => {
            isPlaying = false;
            document.getElementById('voice-viz').classList.remove('speaking');
          }, 500);
        };

        // Interruption: stop all queued audio sources + reset timeline
        window._interruptPlayback = function() {
          for (const src of _queuedSources) { try { src.stop(); } catch {} }
          _queuedSources.length = 0;
          _nextPlayTime = 0;
          isPlaying = false;
          document.getElementById('voice-viz').classList.remove('speaking');
          clearTimeout(window._speechEndTimer);
        };

        // 5. Connect WebSocket
        ws = new WebSocket(WS_URL);
        ws.onopen = () => {
          updateBadge('ws-badge', 'WS: Connected', true);

          // Read provider + voice + mode selection
          const provider = document.getElementById('provider-select').value;
          const voice = document.getElementById('voice-select').value;
          const mode = document.getElementById('mode-select').value;

          // Push voice config (provider-aware)
          if (provider === 'openai') {
            fetch(`${API}/api/config`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ openai_voice: voice })
            }).catch(() => {});
          }

          // Get selected meeting topic for context injection
          const meetingIdx = parseInt(document.getElementById('meeting-select').value);
          const selectedMeeting = (!isNaN(meetingIdx) && meetingList[meetingIdx]) ? meetingList[meetingIdx] : null;
          const topic = selectedMeeting ? selectedMeeting.summary : null;

          // In Talk Locally mode, also start a voice session via REST for full context
          if (mode === 'local') {
            fetch(`${API}/api/voice/session/start`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                mode: 'local',
                transport: 'browser',
                topic: topic,
                provider: provider,
                voice: voice,
              })
            }).then(r => r.json()).then(d => {
              addTranscript('system', 'Talk Locally session: ' + (d.ok ? 'started' : d.error || 'failed')
                + (topic ? ' — topic: ' + topic : '')
                + (d.provider ? ' (' + d.provider + ')' : ''));
              // If we have a meeting brief, inject it after session is ready
              if (selectedMeetingBrief && selectedMeeting?.meetingId) {
                // The backend's injectMeetingBrief is called via the join flow.
                // For Talk Locally via browser, we inject it as a text message.
                setTimeout(function() {
                  if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                      type: 'inject_context',
                      text: '[会议准备资料]\n\n' + selectedMeetingBrief.slice(0, 4000),
                    }));
                    addTranscript('system', 'Meeting prep injected (' + selectedMeetingBrief.length + ' chars)');
                  }
                }, 2000); // Wait for session to be fully established
              }
            }).catch(e => {
              addTranscript('system', 'Session start failed: ' + e.message);
            });
          }

          // Send WS start command — but skip if Talk Locally mode already started via REST
          if (mode !== 'local') {
            const instructions = document.getElementById('instructions').value.trim();
            ws.send(JSON.stringify({
              type: 'start',
              instructions: instructions || undefined,
              provider: provider,
              voice: voice,
            }));
          }
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg.type === 'audio' && msg.audio) {
              // Decode base64 PCM16 → Float32
              const binary = atob(msg.audio);
              const bytes = new Uint8Array(binary.length);
              for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
              const pcm16 = new Int16Array(bytes.buffer);
              const float32 = new Float32Array(pcm16.length);
              for (let i = 0; i < pcm16.length; i++) {
                float32[i] = pcm16[i] / (pcm16[i] < 0 ? 0x8000 : 0x7FFF);
              }
              // Schedule for seamless playback (BufferSource, no ScriptProcessor pops)
              if (window._scheduleAudioChunk) {
                window._scheduleAudioChunk(float32);
              }
            } else if (msg.type === 'interrupt') {
              // User started speaking — stop AI audio playback immediately
              if (window._interruptPlayback) window._interruptPlayback();
            } else if (msg.type === 'transcript') {
              addTranscript(msg.role, msg.text, msg.ts);
            } else if (msg.type === 'status') {
              sessionActive = msg.voiceConnected;
              updateBadge('status-badge', msg.voiceConnected ? 'Voice Connected' : 'Disconnected', msg.voiceConnected);
              if (msg.voiceConnected) {
                btnStart.style.display = 'none';
                btnStop.style.display = '';
                startMicLevel();
                enableLayerToggles(true);
                if (enabledLayers.size > 0) applyLayers();
                // Flush buffered mic audio now that session is ready
                if (window._onSessionReady) window._onSessionReady();
              }
            } else if (msg.type === 'layers_info') {
              renderLayers(msg.layers);
              if (sessionActive) enableLayerToggles(true);
            } else if (msg.type === 'layers_updated') {
              updateLayerCount();
              const names = (msg.activeLayers || []).join(', ') || 'none';
              addTranscript('system', `Layers updated: [${names}] — ${msg.activeTools?.length || 0} tools active`);
            } else if (msg.type === 'error') {
              addTranscript('system', `Error: ${msg.message}`);
              resetUI();
            }
          } catch {}
        };

        ws.onclose = () => {
          updateBadge('ws-badge', 'WS: Closed', false);
          if (sessionActive) stopSession();
        };

        ws.onerror = () => {
          updateBadge('ws-badge', 'WS: Error', false);
          resetUI();
        };

      } catch (e) {
        alert(`Failed to start: ${e.message}`);
        resetUI();
      }
    }

    // ── Stop session ──
    function stopSession() {
      sessionActive = false;
      // In Talk Locally mode, also stop the backend voice session
      var mode = document.getElementById('mode-select').value;
      if (mode === 'local') {
        fetch(`${API}/api/voice/session/stop`, { method: 'POST' }).catch(() => {});
      }
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'stop' }));
        ws.close();
      }
      ws = null;

      // Clean up audio
      if (micProcessor) { micProcessor.disconnect(); micProcessor = null; }
      if (micSource) { micSource.disconnect(); micSource = null; }
      if (micAnalyser) { micAnalyser.disconnect(); micAnalyser = null; }
      if (playbackNode) { playbackNode.disconnect(); playbackNode = null; }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      if (window._interruptPlayback) window._interruptPlayback();
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      if (captureCtx) { captureCtx.close().catch(() => {}); captureCtx = null; }
      playbackQueue = [];
      isPlaying = false;

      resetUI();
      document.getElementById('voice-viz').classList.remove('speaking');
      updateBadge('status-badge', 'Disconnected', false);
    }

    // ── Send text ──
    function sendText() {
      const input = document.getElementById('text-input');
      const text = input.value.trim();
      if (!text) return;
      fetch(`${API}/api/voice/text`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
      });
      input.value = '';
    }

    // ── Transcript ──
    function addTranscript(role, text, ts) {
      const area = document.getElementById('transcript');
      // Remove empty placeholder
      const empty = area.querySelector('.transcript-empty');
      if (empty) empty.remove();

      const entry = document.createElement('div');
      entry.className = 'transcript-entry';
      const time = ts ? new Date(ts).toLocaleTimeString('zh-CN') : new Date().toLocaleTimeString('zh-CN');
      const roleLabels = { user: 'You', assistant: 'CallingClaw AI', system: 'System' };
      entry.innerHTML = `
        <div class="transcript-role ${role}">${roleLabels[role] || role}</div>
        <div class="transcript-text">${escapeHtml(text)}</div>
        <div class="transcript-time">${time}</div>
      `;
      area.appendChild(entry);
      area.scrollTop = area.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Mic level ──
    let micLevelRAF = null;
    function startMicLevel() {
      if (!micAnalyser) return;
      const data = new Uint8Array(micAnalyser.frequencyBinCount);
      const bar = document.getElementById('mic-bar');
      function tick() {
        if (!micAnalyser) return;
        micAnalyser.getByteFrequencyData(data);
        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += data[i];
        const avg = sum / data.length;
        const pct = Math.min(100, (avg / 128) * 100);
        bar.style.width = pct + '%';
        bar.classList.toggle('active', pct > 5);
        micLevelRAF = requestAnimationFrame(tick);
      }
      tick();
    }

    // ── UI Helpers ──
    function resetUI() {
      const btnStart = document.getElementById('btn-start');
      const btnStop = document.getElementById('btn-stop');
      btnStart.style.display = '';
      btnStart.disabled = false;
      btnStart.textContent = 'Start Voice Session';
      btnStop.style.display = 'none';
      if (micLevelRAF) { cancelAnimationFrame(micLevelRAF); micLevelRAF = null; }
      document.getElementById('mic-bar').style.width = '0%';
    }

    function updateBadge(id, text, ok) {
      const el = document.getElementById(id);
      el.textContent = text;
      el.className = ok ? 'badge connected' : 'badge';
    }

    // ═══════════════════════════════════════════════════════
    // Layer Toggle Management
    // ═══════════════════════════════════════════════════════

    const LAYER_ICONS = {
      memory: '&#128218;', calendar: '&#128197;', meeting: '&#128222;',
      automation: '&#9881;', zoom: '&#127909;',
    };
    const LAYER_DESCRIPTIONS = {
      memory: 'recall_context',
      calendar: 'schedule / check calendar',
      meeting: 'join / create / leave meeting',
      automation: 'screen / browser / files',
      zoom: 'Zoom keyboard shortcuts',
    };

    let layerInfo = null;
    let enabledLayers = new Set();

    function renderLayers(info) {
      layerInfo = info;
      const container = document.getElementById('layers-container');
      container.innerHTML = '';
      for (const [key, data] of Object.entries(info)) {
        const checked = enabledLayers.has(key);
        const statusText = data.status ? ` · ${data.status}` : '';
        const row = document.createElement('div');
        row.className = 'layer-row';
        row.innerHTML = `
          <label class="toggle">
            <input type="checkbox" data-layer="${key}" ${checked ? 'checked' : ''} ${!sessionActive ? 'disabled' : ''} onchange="toggleLayer('${key}', this.checked)">
            <span class="slider"></span>
          </label>
          <div class="layer-info">
            <div class="layer-name">${LAYER_ICONS[key] || ''} ${data.label}</div>
            <div class="layer-meta">${data.toolCount} tools · ${LAYER_DESCRIPTIONS[key] || ''}${statusText}</div>
          </div>
        `;
        container.appendChild(row);
      }
      updateLayerCount();
    }

    function toggleLayer(name, enabled) {
      if (enabled) enabledLayers.add(name);
      else enabledLayers.delete(name);
      applyLayers();
    }

    function applyLayers() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'set_layers', layers: [...enabledLayers] }));
    }

    function updateLayerCount() {
      let active = 0, total = 0;
      if (layerInfo) {
        for (const [key, data] of Object.entries(layerInfo)) {
          total += data.toolCount;
          if (enabledLayers.has(key)) active += data.toolCount;
        }
      }
      document.getElementById('layer-count').textContent = `${active}/${total} tools`;
    }

    function enableLayerToggles(enabled) {
      document.querySelectorAll('#layers-container input[type="checkbox"]').forEach(el => {
        el.disabled = !enabled;
      });
    }

    // Load placeholder layers on init
    renderLayers({
      memory:     { label: 'Memory',     toolCount: 1,  tools: ['recall_context'], status: '...' },
      calendar:   { label: 'Calendar',   toolCount: 2,  tools: ['schedule_meeting', 'check_calendar'], status: '...' },
      meeting:    { label: 'Meeting',    toolCount: 4,  tools: ['join_meeting', 'create_and_join_meeting', 'leave_meeting', 'save_meeting_notes'] },
      automation: { label: 'Automation', toolCount: 6,  tools: ['computer_action', 'browser_action', 'open_file', 'share_screen', 'stop_sharing', 'take_screenshot'], status: '...' },
      zoom:       { label: 'Zoom',       toolCount: 1,  tools: ['zoom_control'] },
    });
  </script>
</body>
