<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CallingClaw — Meeting Join Test</title>
  <link rel="icon" type="image/png" href="./logo.png">
  <style>
    :root {
      --bg: #0a0a0a; --surface: #141414; --surface2: #1e1e1e;
      --border: #2a2a2a; --text: #e5e5e5; --text2: #888; --text3: #555;
      --accent: #6366f1; --accent-dim: #4f46e5;
      --green: #22c55e; --red: #ef4444; --yellow: #eab308; --blue: #3b82f6;
      --cyan: #06b6d4; --purple: #a855f7; --orange: #f97316;
      --radius: 12px; --radius-sm: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      background: var(--bg); color: var(--text); height: 100vh;
      display: flex; flex-direction: column;
    }

    .header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
    }
    .header h1 { font-size: 16px; font-weight: 600; }
    .header .back { color: var(--text2); text-decoration: none; font-size: 13px; margin-right: 8px; }
    .header .back:hover { color: var(--text); }
    .header .badge {
      font-size: 11px; padding: 2px 8px; border-radius: 10px;
      background: var(--surface2); color: var(--text2);
    }
    .header .badge.ok { background: rgba(34,197,94,0.15); color: var(--green); }
    .header .ws-dot {
      width: 8px; height: 8px; border-radius: 50%; margin-left: auto;
      background: var(--red); transition: background 0.3s;
    }
    .header .ws-dot.connected { background: var(--green); }
    .header .ws-label { font-size: 11px; color: var(--text3); }

    .main { flex: 1; display: flex; overflow: hidden; }
    .panel-left {
      width: 420px; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow-y: auto;
    }
    .panel-right { flex: 1; display: flex; flex-direction: column; }

    .section { padding: 20px; }
    .section + .section { border-top: 1px solid var(--border); }
    .section-title {
      font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 12px;
    }

    input[type="text"], input[type="url"] {
      width: 100%; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text); font-size: 13px; outline: none;
    }
    input:focus { border-color: var(--accent); }

    .radio-group { display: flex; flex-direction: column; gap: 8px; }
    .radio-option {
      display: flex; align-items: flex-start; gap: 10px; padding: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s;
    }
    .radio-option:hover { border-color: var(--text3); }
    .radio-option.selected { border-color: var(--accent); background: rgba(99,102,241,0.08); }
    .radio-option input[type="radio"] { margin-top: 2px; accent-color: var(--accent); }
    .radio-label { font-size: 14px; font-weight: 500; }
    .radio-desc { font-size: 12px; color: var(--text2); margin-top: 2px; line-height: 1.4; }
    .radio-tag {
      font-size: 10px; padding: 1px 6px; border-radius: 4px; font-weight: 600;
      display: inline-block; margin-top: 4px;
    }
    .tag-old { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .tag-new { background: rgba(34,197,94,0.15); color: var(--green); }
    .tag-alt { background: rgba(168,85,247,0.15); color: var(--purple); }

    .btn {
      padding: 10px 24px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
      cursor: pointer; border: none; transition: all 0.15s; display: inline-flex;
      align-items: center; gap: 8px; width: 100%; justify-content: center;
    }
    .btn-join { background: var(--green); color: #fff; }
    .btn-join:hover { background: #16a34a; }
    .btn-join:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-stop { background: var(--red); color: #fff; }
    .btn-stop:hover { background: #dc2626; }
    .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--text3); }

    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-row .btn { width: auto; flex: 1; font-size: 12px; padding: 8px 16px; }

    /* Log area */
    .log-area {
      flex: 1; overflow-y: auto; padding: 16px 20px; font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 11.5px; line-height: 1.8;
    }
    .log-entry { margin-bottom: 2px; animation: fadeIn 0.15s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
    .log-time { color: var(--text3); margin-right: 6px; font-size: 10px; }
    .log-tag {
      font-size: 9px; padding: 1px 5px; border-radius: 3px; margin-right: 6px;
      font-weight: 600; display: inline-block; min-width: 56px; text-align: center;
    }
    .tag-playwright { background: rgba(6,182,212,0.15); color: var(--cyan); }
    .tag-haiku { background: rgba(168,85,247,0.15); color: var(--purple); }
    .tag-action { background: rgba(59,130,246,0.15); color: var(--blue); }
    .tag-snapshot { background: rgba(136,136,136,0.15); color: var(--text2); }
    .tag-result { background: rgba(34,197,94,0.15); color: var(--green); }
    .tag-error { background: rgba(239,68,68,0.15); color: var(--red); }
    .tag-warn { background: rgba(234,179,8,0.15); color: var(--yellow); }
    .tag-info { background: rgba(136,136,136,0.1); color: var(--text3); }
    .tag-meetjoin { background: rgba(249,115,22,0.15); color: var(--orange); }
    .tag-admit { background: rgba(34,197,94,0.15); color: var(--green); }
    .tag-recovery { background: rgba(239,68,68,0.15); color: var(--red); }

    .log-text { color: var(--text2); }
    .log-text.bright { color: var(--text); }
    .log-text.dim { color: var(--text3); }
    .log-text.green { color: var(--green); }
    .log-text.red { color: var(--red); }
    .log-text.yellow { color: var(--yellow); }

    .log-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .log-title { font-size: 13px; font-weight: 600; color: var(--text2); }

    .empty-state {
      display: flex; align-items: center; justify-content: center;
      height: 100%; color: var(--text3); font-size: 14px; font-family: -apple-system, sans-serif;
    }

    .progress-bar {
      height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
      margin-top: 12px;
    }
    .progress-fill {
      height: 100%; width: 0%; background: var(--accent); border-radius: 2px;
      transition: width 0.3s ease;
    }
    .progress-bar.active .progress-fill {
      animation: indeterminate 1.5s ease-in-out infinite;
      width: 30%;
    }
    @keyframes indeterminate {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(400%); }
    }

    .stats {
      padding: 12px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 24px; font-size: 12px; color: var(--text3);
    }
    .stat-value { color: var(--text); font-weight: 600; }

    .health-bar {
      display: flex; gap: 12px; padding: 12px 20px; border-top: 1px solid var(--border);
      font-size: 11px;
    }
    .health-item { display: flex; align-items: center; gap: 4px; }
    .health-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text3);
    }
    .health-dot.ok { background: var(--green); }
    .health-dot.fail { background: var(--red); }
  </style>
</head>
<body>
  <div class="header">
    <a class="back" href="/">← Panel</a>
    <h1>Meeting Join Test</h1>
    <span class="badge" id="badge">Ready</span>
    <span class="ws-label">EventBus</span>
    <div class="ws-dot" id="ws-dot" title="WebSocket disconnected"></div>
  </div>

  <div class="main">
    <div class="panel-left">
      <div class="section">
        <div class="section-title">Meeting URL</div>
        <input type="url" id="meeting-url" placeholder="https://meet.google.com/xxx-xxxx-xxx" autocomplete="off">
      </div>

      <div class="section">
        <div class="section-title">Display Name</div>
        <input type="text" id="display-name" value="CallingClaw" placeholder="CallingClaw">
      </div>

      <div class="section">
        <div class="section-title">Join Method</div>
        <div class="radio-group">
          <label class="radio-option selected" id="opt-fastjoin" onclick="selectMethod('fastjoin')">
            <input type="radio" name="method" value="fastjoin" checked>
            <div>
              <div class="radio-label">Playwright Fast-Join (Deterministic)</div>
              <div class="radio-desc">
                Pure JS eval — no AI model. Handles Join/Switch here/Ask to join,
                camera OFF + mic ON, BlackHole audio, waiting room. ~3-5s.
                Auto-starts admission monitor (3s interval, chained two-step).
              </div>
              <span class="radio-tag tag-new">CURRENT — v2.2.1</span>
            </div>
          </label>
          <label class="radio-option" id="opt-browserloop" onclick="selectMethod('browserloop')">
            <input type="radio" name="method" value="browserloop">
            <div>
              <div class="radio-label">Browser Action Loop (Haiku Model-Driven)</div>
              <div class="radio-desc">
                Haiku snapshot → model decides → Playwright executes → verify.
                More flexible but slower (~15-30s). Good fallback for unknown UI states.
              </div>
              <span class="radio-tag tag-alt">ALT — Model-driven</span>
            </div>
          </label>
          <label class="radio-option" id="opt-meetjoiner" onclick="selectMethod('meetjoiner')">
            <input type="radio" name="method" value="meetjoiner">
            <div>
              <div class="radio-label">MeetJoiner (osascript)</div>
              <div class="radio-desc">
                Legacy: osascript JavaScript injection, fixed timing delays, no completion detection.
                Also starts Voice AI + audio bridge (full meeting flow).
              </div>
              <span class="radio-tag tag-old">LEGACY</span>
            </div>
          </label>
        </div>
      </div>

      <div class="section">
        <button class="btn btn-join" id="btn-join" onclick="joinMeeting()">Join Meeting</button>
        <button class="btn btn-stop" id="btn-stop" onclick="abortJoin()" style="display:none">Abort</button>
        <div class="progress-bar" id="progress">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="btn-row">
          <button class="btn btn-secondary" onclick="checkHealth()">Health Check</button>
          <button class="btn btn-secondary" onclick="resetBrowser()">Reset Browser</button>
          <button class="btn btn-secondary" onclick="leaveMeeting()">Leave Meeting</button>
        </div>
      </div>
    </div>

    <div class="panel-right">
      <div class="log-header">
        <span class="log-title">Execution Log (real-time via EventBus WS)</span>
        <button style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:12px;" onclick="clearLog()">Clear</button>
      </div>
      <div class="log-area" id="log">
        <div class="empty-state">Select a method and enter a meeting URL to begin</div>
      </div>
      <div class="stats" id="stats" style="display:none">
        <div>Steps: <span class="stat-value" id="stat-steps">0</span></div>
        <div>Duration: <span class="stat-value" id="stat-duration">-</span></div>
        <div>Method: <span class="stat-value" id="stat-method">-</span></div>
        <div>Result: <span class="stat-value" id="stat-result">-</span></div>
      </div>
      <div class="health-bar" id="health-bar" style="display:none"></div>
    </div>
  </div>

  <script>
    const API = location.origin;
    let selectedMethod = 'fastjoin';
    let abortController = null;
    let running = false;
    let ws = null;
    let stepCount = 0;

    // ══════════════════════════════════════════════════════
    // WebSocket — real-time EventBus stream
    // ══════════════════════════════════════════════════════

    function connectWS() {
      const wsUrl = `ws://${location.host}/ws/events`;
      ws = new WebSocket(wsUrl);

      ws.onopen = () => {
        document.getElementById('ws-dot').classList.add('connected');
        document.getElementById('ws-dot').title = 'WebSocket connected';
      };

      ws.onclose = () => {
        document.getElementById('ws-dot').classList.remove('connected');
        document.getElementById('ws-dot').title = 'WebSocket disconnected — reconnecting...';
        setTimeout(connectWS, 2000);
      };

      ws.onerror = () => {};

      ws.onmessage = (msg) => {
        try {
          const data = JSON.parse(msg.data);
          handleEvent(data.event, data.data);
        } catch {}
      };
    }

    function handleEvent(event, data) {
      // Always show recovery and admission events
      if (event.startsWith('recovery.')) {
        log(`Recovery: ${event} — ${data.detail || (data.success ? 'OK' : 'FAILED')}`,
          data.success ? 'result' : 'error', 'RECOVER');
        return;
      }

      if (!running && !event.startsWith('browser_loop.') && !event.startsWith('meeting.')) return;

      switch (event) {
        // ── Browser Action Loop events ──
        case 'browser_loop.started':
          log(`Goal: "${(data.goal || '').slice(0, 120)}"`, 'info', 'GOAL');
          log(`Max steps: ${data.maxSteps}, timeout: ${(data.timeoutMs/1000).toFixed(0)}s`, 'info', 'CONFIG');
          break;

        case 'browser_loop.snapshot':
          log(`Taking snapshot (${data.phase})...`, 'snapshot', 'SNAP');
          break;

        case 'browser_loop.snapshot_done':
          log(`Snapshot: ${data.length} chars — ${data.preview.slice(0, 100).replace(/\n/g, ' ')}`, 'snapshot', 'SNAP');
          break;

        case 'browser_loop.model_call':
          log(`Calling ${data.model} (step ${data.step}, snapshot: ${data.snapshotLength} chars)...`, 'haiku', 'HAIKU');
          break;

        case 'browser_loop.model_response':
          const actionDesc = `${data.action}${data.ref ? ' @' + data.ref : ''}${data.text ? ' "' + data.text.slice(0, 60) + '"' : ''}`;
          log(`→ ${actionDesc}  (${data.modelMs}ms)`, 'haiku', 'HAIKU', 'bright');
          log(`  Reason: ${data.reason}`, 'haiku', '', 'dim');
          break;

        case 'browser_loop.step':
          stepCount++;
          const sDesc = `Step ${data.step}: ${data.action}${data.ref ? ' @' + data.ref : ''}${data.text ? ' "' + data.text.slice(0, 60) + '"' : ''}`;
          log(sDesc, 'action', 'STEP');
          document.getElementById('stat-steps').textContent = stepCount;
          break;

        case 'browser_loop.executing':
          log(`Executing: playwright-cli ${data.action}${data.ref ? ' @' + data.ref : ''}${data.text ? ' "' + data.text.slice(0, 60) + '"' : ''}`, 'playwright', 'PW-CLI');
          break;

        case 'browser_loop.executed':
          log(`Done (${data.execMs}ms) → new snapshot: ${data.snapshotLength} chars`, 'playwright', 'PW-CLI', 'dim');
          break;

        case 'browser_loop.abort':
          log('Abort signal received', 'warn', 'ABORT');
          break;

        case 'browser_loop.error':
          log(`Error: ${data.error}`, 'error', 'ERROR');
          break;

        case 'browser_loop.done':
          const s = data.aborted ? 'ABORTED' : data.success ? 'SUCCESS' : 'FAILED';
          const cls = data.aborted ? 'warn' : data.success ? 'result' : 'error';
          log(`${s} — ${data.steps?.length || 0} steps, ${((data.durationMs || 0) / 1000).toFixed(1)}s`, cls, s);
          showStats(data.steps?.length || 0, data.durationMs, 'browserloop', data.success && !data.aborted);
          setRunning(false);
          break;

        // ── Meeting lifecycle events ──
        case 'meeting.joining':
          log(`Joining: ${data.meet_url || data.url || ''}`, 'meetjoin', 'MEET');
          break;
        case 'meeting.join_step':
          stepCount++;
          log(data.step, 'playwright', 'JOIN');
          document.getElementById('stat-steps').textContent = stepCount;
          break;
        case 'meeting.started':
          log('Meeting started — recording active', 'result', 'MEET');
          break;
        case 'meeting.ended':
          log('Meeting ended', 'info', 'MEET');
          setRunning(false);
          break;
        case 'meeting.agenda':
          log(`Agenda: ${data.topic || 'Meeting'}`, 'info', 'AGENDA');
          break;
      }
    }

    connectWS();

    // ══════════════════════════════════════════════════════
    // Method selection
    // ══════════════════════════════════════════════════════

    function selectMethod(method) {
      selectedMethod = method;
      document.getElementById('opt-fastjoin').classList.toggle('selected', method === 'fastjoin');
      document.getElementById('opt-browserloop').classList.toggle('selected', method === 'browserloop');
      document.getElementById('opt-meetjoiner').classList.toggle('selected', method === 'meetjoiner');
      document.querySelector(`input[value="${method}"]`).checked = true;
    }

    // ══════════════════════════════════════════════════════
    // Logging
    // ══════════════════════════════════════════════════════

    function log(text, tagType = 'info', tagLabel = '', textClass = '') {
      const area = document.getElementById('log');
      const empty = area.querySelector('.empty-state');
      if (empty) empty.remove();

      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
      const tagHtml = tagLabel
        ? `<span class="log-tag tag-${tagType}">${escapeHtml(tagLabel)}</span>`
        : `<span class="log-tag tag-${tagType}">&nbsp;</span>`;
      entry.innerHTML = `<span class="log-time">${time}</span>${tagHtml}<span class="log-text ${textClass}">${escapeHtml(text)}</span>`;
      area.appendChild(entry);
      area.scrollTop = area.scrollHeight;
    }

    function escapeHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '<div class="empty-state">Log cleared</div>';
      document.getElementById('stats').style.display = 'none';
      stepCount = 0;
    }

    // ══════════════════════════════════════════════════════
    // UI state
    // ══════════════════════════════════════════════════════

    function setRunning(on) {
      running = on;
      document.getElementById('btn-join').style.display = on ? 'none' : '';
      document.getElementById('btn-stop').style.display = on ? '' : 'none';
      document.getElementById('meeting-url').disabled = on;
      document.querySelectorAll('input[name="method"]').forEach(r => r.disabled = on);
      document.getElementById('progress').classList.toggle('active', on);

      const badge = document.getElementById('badge');
      badge.textContent = on ? 'Joining...' : 'Ready';
      badge.className = on ? 'badge' : 'badge';
    }

    function showStats(steps, durationMs, method, success) {
      document.getElementById('stats').style.display = '';
      document.getElementById('stat-steps').textContent = steps;
      document.getElementById('stat-duration').textContent = durationMs ? `${(durationMs / 1000).toFixed(1)}s` : '-';
      const methodNames = {
        fastjoin: 'Playwright Fast-Join (JS eval)',
        browserloop: 'Browser Action Loop (Haiku)',
        meetjoiner: 'MeetJoiner (osascript)',
      };
      document.getElementById('stat-method').textContent = methodNames[method] || method;
      const resultEl = document.getElementById('stat-result');
      resultEl.textContent = success ? 'SUCCESS' : 'FAILED';
      resultEl.style.color = success ? 'var(--green)' : 'var(--red)';

      const badge = document.getElementById('badge');
      badge.textContent = success ? 'Joined' : 'Failed';
      badge.className = success ? 'badge ok' : 'badge';
    }

    // ══════════════════════════════════════════════════════
    // Join meeting
    // ══════════════════════════════════════════════════════

    async function joinMeeting() {
      const url = document.getElementById('meeting-url').value.trim();
      if (!url) {
        log('Please enter a meeting URL', 'error', 'ERROR');
        return;
      }

      setRunning(true);
      stepCount = 0;
      abortController = new AbortController();

      const methodNames = {
        fastjoin: 'Playwright Fast-Join (deterministic JS eval, no AI model)',
        browserloop: 'Browser Action Loop (Haiku model-driven)',
        meetjoiner: 'MeetJoiner (osascript legacy)',
      };
      log(`Method: ${methodNames[selectedMethod]}`, 'info', 'START', 'bright');
      log(`URL: ${url}`, 'info', 'URL');

      try {
        if (selectedMethod === 'fastjoin') {
          await joinViaFastJoin(url, abortController.signal);
        } else if (selectedMethod === 'browserloop') {
          await joinViaBrowserLoop(url, abortController.signal);
        } else {
          await joinViaMeetJoiner(url, abortController.signal);
        }
      } catch (e) {
        if (e.name === 'AbortError') {
          log('Fetch aborted', 'warn', 'ABORT');
        } else {
          log(`Error: ${e.message}`, 'error', 'ERROR');
        }
      } finally {
        if (selectedMethod === 'meetjoiner' || selectedMethod === 'fastjoin') {
          setRunning(false);
        }
        abortController = null;
      }
    }

    // ── Playwright Fast-Join path (CURRENT — deterministic, no AI) ──
    async function joinViaFastJoin(url, signal) {
      const displayName = document.getElementById('display-name').value.trim() || 'CallingClaw';

      log('Calling /api/meeting/join (Playwright fast-join + calendar lookup + admission monitor)...', 'playwright', 'PW-CLI');
      const startTime = performance.now();

      const resp = await fetch(`${API}/api/meeting/join`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
        signal,
      });

      const data = await resp.json();
      const durationMs = Math.round(performance.now() - startTime);

      if (data.error) {
        log(`API error: ${data.error}`, 'error', 'ERROR');
        if (data.hint) log(data.hint, 'warn', 'HINT');
        showStats(stepCount, durationMs, 'fastjoin', false);
        return;
      }

      // Log all the details
      if (data.validated) {
        log(`Platform: ${data.validated.platform}`, 'playwright', 'JOIN');
      }
      if (data.attendees) {
        log(`Attendees from calendar: ${data.attendees}`, 'info', 'CAL');
      }
      log(`Status: ${data.status}`, data.status === 'in_meeting' ? 'result' : 'warn',
          data.status === 'in_meeting' ? 'OK' : data.status?.toUpperCase() || 'UNKNOWN');

      if (data.voice) log(`Voice: ${data.voice}`, 'info', 'VOICE');
      if (data.audio_mode) log(`Audio: ${data.audio_mode}`, 'info', 'AUDIO');
      if (data.admissionMonitor) log(`Admission monitor: ${data.admissionMonitor}`, 'admit', 'ADMIT');
      if (data.prepBrief) {
        log(`Prep brief: ${data.prepBrief.keyPoints || 0} key points, ${data.prepBrief.attendees || 0} attendees`, 'info', 'PREP');
      }

      const success = data.status === 'in_meeting';
      if (success) {
        log(`Joined in ${(durationMs / 1000).toFixed(1)}s — camera off, mic on (BlackHole bridge)`, 'result', 'DONE', 'bright');
      } else {
        log(`Result: ${data.status} — ${data.joinSummary || data.error || 'unknown'}`, 'error', 'FAIL');
      }

      showStats(stepCount, durationMs, 'fastjoin', success);
    }

    // ── Browser Action Loop path (Haiku model-driven) ──
    async function joinViaBrowserLoop(url, signal) {
      const displayName = document.getElementById('display-name').value.trim() || 'CallingClaw';

      log('Sending goal to Browser Action Loop API...', 'haiku', 'HAIKU');
      log('Real-time events will stream below via EventBus WebSocket', 'info', 'INFO', 'dim');

      const resp = await fetch(`${API}/api/meeting/join-browser`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url, displayName }),
        signal,
      });

      const data = await resp.json();

      if (data.error) {
        log(`API error: ${data.error}`, 'error', 'ERROR');
        if (data.hint) log(data.hint, 'warn', 'HINT');
        showStats(0, 0, 'browserloop', false);
        setRunning(false);
      }
    }

    // ── MeetJoiner path (legacy osascript) ──
    async function joinViaMeetJoiner(url, signal) {
      log('Calling /api/meeting/join (MeetJoiner osascript path)...', 'meetjoin', 'MEET');
      log('Note: MeetJoiner uses fixed delays with no real-time streaming', 'info', 'INFO', 'dim');

      const resp = await fetch(`${API}/api/meeting/join`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url }),
        signal,
      });

      const data = await resp.json();

      if (data.error) {
        log(`API error: ${data.error}`, 'error', 'ERROR');
        showStats(0, 0, 'meetjoiner', false);
        return;
      }

      log(`Status: ${data.status}`, data.status === 'in_meeting' ? 'result' : 'error',
          data.status === 'in_meeting' ? 'OK' : 'FAIL');
      showStats(8, null, 'meetjoiner', data.status === 'in_meeting');
    }

    // ══════════════════════════════════════════════════════
    // Utility buttons
    // ══════════════════════════════════════════════════════

    async function checkHealth() {
      log('Checking subsystem health...', 'info', 'HEALTH');
      try {
        const resp = await fetch(`${API}/api/recovery/health`);
        const data = await resp.json();

        const bar = document.getElementById('health-bar');
        bar.style.display = '';
        bar.innerHTML = Object.entries(data.subsystems).map(([k, v]) =>
          `<div class="health-item">
            <div class="health-dot ${v ? 'ok' : 'fail'}"></div>
            <span style="color: ${v ? 'var(--text2)' : 'var(--red)'}">${k}</span>
          </div>`
        ).join('');

        log(`Health: ${data.healthy ? 'ALL OK' : 'ISSUES DETECTED'}`, data.healthy ? 'result' : 'error', 'HEALTH', 'bright');
        for (const [k, v] of Object.entries(data.subsystems)) {
          log(`  ${v ? '●' : '○'} ${k}: ${v ? 'ok' : 'DOWN'}`, v ? 'info' : 'error', '', 'dim');
        }
      } catch (e) {
        log(`Health check failed: ${e.message}`, 'error', 'ERROR');
      }
    }

    async function resetBrowser() {
      log('Resetting browser (kill Chrome + restart Playwright)...', 'recovery', 'RESET');
      try {
        const resp = await fetch(`${API}/api/recovery/browser`, { method: 'POST' });
        const data = await resp.json();
        log(`Browser reset: ${data.detail}`, data.success ? 'result' : 'error', data.success ? 'OK' : 'FAIL');
      } catch (e) {
        log(`Reset failed: ${e.message}`, 'error', 'ERROR');
      }
    }

    async function leaveMeeting() {
      log('Leaving meeting...', 'meetjoin', 'LEAVE');
      try {
        const resp = await fetch(`${API}/api/meeting/leave`, { method: 'POST' });
        const data = await resp.json();
        log(`Left meeting: ${data.summary || data.status || 'done'}`, 'result', 'LEAVE');
      } catch (e) {
        log(`Leave failed: ${e.message}`, 'error', 'ERROR');
      }
    }

    // ── Abort ──
    async function abortJoin() {
      log('Aborting...', 'warn', 'ABORT');

      if (abortController) {
        abortController.abort();
      }

      if (selectedMethod === 'browserloop') {
        try {
          await fetch(`${API}/api/meeting/join-browser/abort`, { method: 'POST' });
          log('Backend abort signal sent', 'warn', 'ABORT');
        } catch (e) {
          log(`Abort request failed: ${e.message}`, 'error', 'ERROR');
        }
      }

      setRunning(false);
    }

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !running && document.getElementById('meeting-url').value.trim()) {
        joinMeeting();
      }
      if (e.key === 'Escape' && running) {
        abortJoin();
      }
    });

    // ── Auto health check on load ──
    checkHealth();
  </script>
</body>
</html>
